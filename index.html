<title>Yoto Icon Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #16171a;
    --panel: #1e2024;
    --panel-border: #2c2f36;
    --text: #e6e6e6;
    --text-dim: #9a9ea6;
    --accent: #5aa9ff;
    --accent-text: #0b1420;
    --checker-a: #2a2d32;
    --checker-b: #34373d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--panel-border);
  }
  /* 940px = main's 980px minus its 2x20px padding (border-box), so the
     header text lines up with the content column below */
  header h1 {
    max-width: 940px;
    margin: 0 auto;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  header p {
    max-width: 940px;
    margin: 4px auto 0;
    color: var(--text-dim);
    font-size: 12px;
  }
  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 16px 20px 40px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 18px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .control-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .control-group input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
  }
  .control-group select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    padding: 4px 6px;
    font-size: 13px;
  }
  .control-group input[type="range"] {
    accent-color: var(--accent);
    width: 100px;
  }
  .sub-value {
    color: var(--text-dim);
    font-size: 12px;
    min-width: 28px;
  }
  .file-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  button, .file-btn {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  button.secondary, .file-btn {
    background: var(--panel-border);
    color: var(--text);
  }
  .center-btn {
    padding: 3px 8px;
    font-size: 10px;
    border-radius: 4px;
  }
  .center-btn.active {
    background: var(--accent);
    color: var(--accent-text);
  }
  .segmented {
    display: inline-flex;
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    overflow: hidden;
  }
  .segmented .segment {
    background: var(--bg);
    color: var(--text);
    border: none;
    border-radius: 0;
    border-right: 1px solid var(--panel-border);
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .segmented .segment:last-child {
    border-right: none;
  }
  .segmented .segment.active {
    background: var(--accent);
    color: var(--accent-text);
  }
  .paint-toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--panel-border);
  }
  .grid-toggle {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    margin-left: auto;
  }
  .brush-swatch {
    width: 22px;
    height: 22px;
    padding: 0;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    background-color: var(--panel-border);
  }
  .brush-swatch.active {
    border-color: var(--accent);
  }
  .brush-black { background-color: #000; }
  .brush-white { background-color: #fff; }
  .brush-eraser {
    background-image:
      linear-gradient(45deg, #888 25%, transparent 25%),
      linear-gradient(-45deg, #888 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #888 75%),
      linear-gradient(-45deg, transparent 75%, #888 75%);
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
    background-color: #ccc;
  }
  .brush-divider {
    width: 1px;
    height: 18px;
    background: var(--panel-border);
    margin: 0 2px;
  }
  .brush-swatch-wrap {
    position: relative;
    width: 22px;
    height: 22px;
    display: inline-block;
  }
  .brush-swatch-wrap .brush-swatch {
    width: 100%;
    height: 100%;
  }
  .brush-swatch-wrap input[type="color"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    padding: 0;
    border: none;
  }
  .brush-eyedropper {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background-color: transparent;
    color: var(--text-dim);
  }
  .brush-eyedropper:hover {
    color: var(--accent);
    border-color: var(--panel-border);
  }
  .tool-btn {
    width: 22px;
    height: 22px;
    padding: 0;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background-color: transparent;
    color: var(--text-dim);
  }
  .tool-btn:hover {
    color: var(--accent);
  }
  .tool-btn.active {
    background-color: var(--accent);
    color: var(--accent-text);
  }
  .file-controls input[type="text"] {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    padding: 4px 6px;
    font-size: 13px;
    width: 140px;
  }
  input[type="file"] { display: none; }
  .panels {
    /* Flow box: three equal panels side by side, wrapping to fewer columns on
       narrow screens so the layout works on mobile. */
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }
  .panel {
    flex: 1 1 240px;
    min-width: 220px;
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--panel);
  }
  .panel-label {
    padding: 8px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--panel-border);
    /* mobile: double-tap on the label must not trigger browser double-tap
       zoom or text selection (looked like the panel "collapsing") */
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
  }
  /* Tap/click on a panel title collapses the panel to just its title bar
     (mobile: reach the other panels without endless scrolling). !important
     because some children carry JS-set inline display values. */
  .panel.collapsed > :not(.panel-label) {
    display: none !important;
  }
  .panel-body {
    position: relative;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      linear-gradient(45deg, var(--checker-a) 25%, transparent 25%),
      linear-gradient(-45deg, var(--checker-a) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--checker-a) 75%),
      linear-gradient(-45deg, transparent 75%, var(--checker-a) 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    background-color: var(--checker-b);
  }
  .yoto-preview-body {
    /* Same square footprint as Original/Output so all three panels line up;
       no checkerboard - the device photo brings its own background. */
    background-image: none;
    background-color: var(--panel);
    padding: 12px;
  }
  #yotoCanvas {
    max-width: 100%;
    max-height: 100%;
    height: auto;
    display: none;
  }
  #leftCanvas {
    width: 90%;
    height: 90%;
    display: none;
    touch-action: none;
  }
  #rightCanvas {
    width: 90%;
    height: 90%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    touch-action: none;
  }
  .grid-overlay {
    position: absolute;
    top: 5%;
    left: 5%;
    width: 90%;
    height: 90%;
    box-sizing: border-box;
    pointer-events: none;
    display: none;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background-image:
      linear-gradient(to right, rgba(255, 255, 255, 0.15) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
    background-size: calc(100% / 16) calc(100% / 16);
  }
  .grid-overlay.on {
    display: block;
  }
  .drop-hint {
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    padding: 20px;
    pointer-events: none;
  }
  .palette-strip {
    margin-top: 16px;
  }
  .attribution {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .attribution a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px dotted var(--text-dim);
  }
  .attribution a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .palette-strip h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    font-weight: 600;
    margin: 0 0 8px;
  }
  .colormap-heading {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .colormap-controls {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-left: auto;
    text-transform: none;
    letter-spacing: normal;
  }
  .colormap-controls label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-dim);
    cursor: pointer;
  }
  .swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .swatch {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  .swatch:hover {
    border-color: var(--accent);
  }
  .swatch .chip {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .swatch .hex {
    color: var(--text);
  }
  .swatch .pct {
    color: var(--text-dim);
  }
  .swatch-edit {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
  }
  .swatch-edit .chip-wrap {
    position: relative;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }
  .swatch-edit .chip {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .swatch-edit .chip-wrap input[type="color"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    padding: 0;
    border: none;
  }
  .swatch-edit .hex {
    color: var(--text);
  }
  .toast {
    display: inline-block;
    margin-left: 8px;
    font-size: 12px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 900px) {
    .panels {
      flex-direction: column;
    }
    .panel {
      flex: 1 1 auto;
      min-width: 0;
      width: 100%;
    }
    .controls {
      gap: 10px;
    }
    .control-group {
      flex: 1 1 auto;
    }
    .file-controls {
      flex: 1 1 100%;
      margin-left: 0;
    }
    .file-controls input[type="text"] {
      width: 100px;
    }
  }
</style>

<header>
  <h1>Yoto Icon Maker</h1>
  <p>Load an image, tweak it, export a 16x16 PNG icon.</p>
</header>

<main>
  <div class="controls">
    <div class="control-group">
      <label><input type="checkbox" id="bgToggle"> Remove background</label>
      <span id="tolWrap" style="display:none; align-items:center; gap:6px;">
        <span class="sub-value">Tolerance</span>
        <input type="range" id="bgTolerance" min="0" max="50" value="30">
        <span class="sub-value" id="bgToleranceVal">30</span>
      </span>
    </div>

    <div class="control-group">
      <span class="sub-value">Sampling</span>
      <div class="segmented" id="samplingSegmented">
        <button type="button" class="segment active" data-mode="smooth">Smooth</button>
        <button type="button" class="segment" data-mode="nearest">Nearest</button>
        <button type="button" class="segment" data-mode="dominant">Dominant</button>
        <button type="button" class="segment" data-mode="median">Median</button>
      </div>
    </div>

    <div class="control-group">
      <label><input type="checkbox" id="bgColorToggle"> BG color</label>
      <input type="color" id="bgColorInput" value="#000000" style="display:none;">
    </div>

    <div class="control-group">
      <span class="sub-value">Zoom</span>
      <input type="range" id="zoomSlider" min="0.25" max="5" step="0.05" value="1">
      <span class="sub-value" id="zoomVal">1.0</span>
    </div>

    <div class="file-controls">
      <label class="file-btn" for="fileInput">Choose file</label>
      <input type="file" id="fileInput" accept="image/*">
      <input type="text" id="filenameInput" placeholder="filename">
      <button id="exportBtn">.png</button>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-label" style="display:flex; align-items:center; justify-content:space-between;">
        <span>Original</span>
        <button id="centerBtn" class="secondary center-btn" disabled>Center</button>
      </div>
      <div class="panel-body" id="leftBody">
        <div class="drop-hint" id="dropHint">Drop image here<br>or paste (Ctrl+V)<br>or choose a file</div>
        <canvas id="leftCanvas"></canvas>
      </div>
    </div>
    <div class="panel">
      <div class="panel-label">Output (16x16)</div>
      <div class="paint-toolbar">
        <button id="toolPencil" type="button" class="tool-btn active" title="Pencil">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
            <polygon points="1,15 5,11 13,3 15,5 7,13"/>
          </svg>
        </button>
        <button id="toolBucket" type="button" class="tool-btn" title="Bucket fill">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 5l5-3 5 3-5 3-5-3z"/>
            <path d="M2 5v3c0 1.5 2.5 3 5 3s5-1.5 5-3V5"/>
            <circle cx="13.5" cy="12.5" r="1.3" fill="currentColor" stroke="none"/>
          </svg>
        </button>
        <span class="brush-divider"></span>
        <button id="brushBlack" type="button" class="brush-swatch brush-black" title="Black"></button>
        <button id="brushWhite" type="button" class="brush-swatch brush-white" title="White"></button>
        <span class="brush-divider"></span>
        <span class="brush-swatch-wrap">
          <button id="brushColor" type="button" class="brush-swatch" title="Custom"></button>
          <input type="color" id="brushColorInput" value="#ff0000" title="Custom">
        </span>
        <button id="brushEyedropper" type="button" class="brush-swatch brush-eyedropper" title="Pick from screen">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
            <path d="M13.354.646a1.207 1.207 0 0 0-1.708 0L8.5 3.793l-.646-.647a.5.5 0 1 0-.708.708L8.293 5l-7.147 7.146A.5.5 0 0 0 1 12.5v1.793l-.854.853a.5.5 0 1 0 .708.708L1.707 15H3.5a.5.5 0 0 0 .354-.146L11 7.707l1.146 1.147a.5.5 0 0 0 .708-.708l-.647-.646 3.147-3.146a1.207 1.207 0 0 0 0-1.708l-2-2zM2 12.707l7-7L10.293 7l-7 7H2v-1.293z"/>
          </svg>
        </button>
        <button id="brushEraser" type="button" class="brush-swatch brush-eraser" title="Eraser"></button>
        <button id="paintUndoBtn" type="button" class="secondary center-btn" disabled>Undo</button>
        <button id="paintClearBtn" type="button" class="secondary center-btn">Clear</button>
        <button id="paintCanvasBtn" type="button" class="secondary center-btn" title="Canvas base: image (click to cycle to transparent/white/black)">Canvas</button>
        <label class="grid-toggle" title="Show pixel grid (display only, not exported)">
          <input type="checkbox" id="gridToggle" checked> Grid
        </label>
      </div>
      <div class="panel-body">
        <canvas id="rightCanvas" width="16" height="16"></canvas>
        <div class="grid-overlay on" id="gridOverlay"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-label">Yoto preview</div>
      <div class="panel-body yoto-preview-body">
        <div class="drop-hint" id="yotoHint">No image yet</div>
        <canvas id="yotoCanvas" width="370" height="372"></canvas>
      </div>
    </div>
  </div>

  <div class="palette-strip">
    <h2>Most-used colors</h2>
    <div class="swatches" id="swatches"></div>
    <span class="toast" id="toast"></span>
  </div>

  <div class="palette-strip">
    <h2 class="colormap-heading">
      <span>Output color map<span id="colorMapCount"></span></span>
      <span class="colormap-controls">
        <div class="segmented" id="colorsSegmented">
          <button type="button" class="segment" data-colors="4">4</button>
          <button type="button" class="segment" data-colors="8">8</button>
          <button type="button" class="segment" data-colors="16">16</button>
          <button type="button" class="segment" data-colors="32">32</button>
          <button type="button" class="segment" data-colors="64">64</button>
          <button type="button" class="segment" data-colors="128">128</button>
          <!-- "256" = no reduction (a 16x16 icon can't exceed 256 colors); internal value stays 'off' -->
          <button type="button" class="segment active" data-colors="off">256</button>
        </div>
        <label><input type="checkbox" id="ditherToggle"> Dither</label>
        <button id="resetColorsBtn" type="button" class="secondary center-btn">Reset colors</button>
      </span>
    </h2>
    <div class="swatches" id="colorsUsedSwatches"></div>
  </div>

  <footer class="attribution">
    by Patrick Gawron &middot; <a href="https://github.com/pg0/yoto-icon">github.com/pg0/yoto-icon</a>
  </footer>
</main>

<script>
(function () {
  const FINAL_SIZE = 16;
  const MAX_WORK_SIZE = 512;
  const YOTO_PANEL = { x0: 198, x1: 335, y0: 197, y1: 335 };
  const YOTO_ICON_SIZE = 68;
  const YOTO_DRAW_X = (YOTO_PANEL.x0 + YOTO_PANEL.x1) / 2 - YOTO_ICON_SIZE / 2;
  const YOTO_DRAW_Y = (YOTO_PANEL.y0 + YOTO_PANEL.y1) / 2 - YOTO_ICON_SIZE / 2;

  const bgToggle = document.getElementById('bgToggle');
  const tolWrap = document.getElementById('tolWrap');
  const bgTolerance = document.getElementById('bgTolerance');
  const bgToleranceVal = document.getElementById('bgToleranceVal');
  const samplingSegmented = document.getElementById('samplingSegmented');
  const colorsSegmented = document.getElementById('colorsSegmented');
  const ditherToggle = document.getElementById('ditherToggle');
  const bgColorToggle = document.getElementById('bgColorToggle');
  const bgColorInput = document.getElementById('bgColorInput');
  const zoomSlider = document.getElementById('zoomSlider');
  const zoomVal = document.getElementById('zoomVal');
  const fileInput = document.getElementById('fileInput');
  const filenameInput = document.getElementById('filenameInput');
  const leftBody = document.getElementById('leftBody');
  const centerBtn = document.getElementById('centerBtn');
  const dropHint = document.getElementById('dropHint');
  const leftCanvas = document.getElementById('leftCanvas');
  const rightCanvas = document.getElementById('rightCanvas');
  const gridOverlay = document.getElementById('gridOverlay');
  const gridToggle = document.getElementById('gridToggle');
  const toolPencil = document.getElementById('toolPencil');
  const toolBucket = document.getElementById('toolBucket');
  const brushBlack = document.getElementById('brushBlack');
  const brushWhite = document.getElementById('brushWhite');
  const brushColor = document.getElementById('brushColor');
  const brushColorInput = document.getElementById('brushColorInput');
  const brushEyedropper = document.getElementById('brushEyedropper');
  const brushEraser = document.getElementById('brushEraser');
  const paintUndoBtn = document.getElementById('paintUndoBtn');
  const paintClearBtn = document.getElementById('paintClearBtn');
  const paintCanvasBtn = document.getElementById('paintCanvasBtn');
  const swatchesEl = document.getElementById('swatches');
  const colorsUsedEl = document.getElementById('colorsUsedSwatches');
  const exportBtn = document.getElementById('exportBtn');
  const toast = document.getElementById('toast');
  const yotoHint = document.getElementById('yotoHint');
  const yotoCanvas = document.getElementById('yotoCanvas');

  const leftCtx = leftCanvas.getContext('2d');
  const rightCtx = rightCanvas.getContext('2d', { willReadFrequently: true });
  const yotoCtx = yotoCanvas.getContext('2d');

  let yotoPhotoLoaded = false;
  const yotoPhoto = new Image();
  yotoPhoto.onload = () => {
    yotoPhotoLoaded = true;
    yotoHint.style.display = 'none';
    yotoCanvas.style.display = 'block';
    renderYotoPreview();
  };
  yotoPhoto.src = './yoto-mini-front.png';

  let sourceImage = null;
  let cropOffsetX = 0;
  let cropOffsetY = 0;
  let zoom = 1;
  let samplingMode = 'smooth'; // 'smooth' | 'nearest' | 'dominant' | 'median'
  let colorsValue = 'off'; // 'off' | '4' | '8' | '16' | '32' | '64' | '128'
  let isDragging = false;
  let dragStartX = 0;
  let dragStartY = 0;
  let dragStartOffsetX = 0;
  let dragStartOffsetY = 0;

  // Persistent 16x16 hand-paint overlay: index = y*16+x.
  // null = untouched, {r,g,b} = painted color, 'erase' = forced transparent.
  let paintLayer = new Array(FINAL_SIZE * FINAL_SIZE).fill(null);
  let activeBrush = null; // 'black' | 'white' | 'color' | 'eraser' | null
  let paintTool = 'pencil'; // 'pencil' | 'bucket'
  let isPainting = false;
  // "Canvas" base-mode: non-destructive override of what the paint layer
  // sits on top of. Never touches paintLayer itself and never goes through
  // undo - it's just a display/render choice, cycled by the toolbar button.
  let canvasMode = 'image'; // 'image' | 'transparent' | 'white' | 'black'
  const CANVAS_MODE_CYCLE = ['image', 'transparent', 'white', 'black'];
  const CANVAS_MODE_TITLES = {
    image: 'Canvas base: image (click to cycle to transparent/white/black)',
    transparent: 'Canvas base: transparent - image hidden (click to cycle)',
    white: 'Canvas base: solid white - image hidden (click to cycle)',
    black: 'Canvas base: solid black - image hidden (click to cycle)'
  };
  const UNDO_LIMIT = 50;
  let undoStack = []; // snapshots (256-entry array copies) of paintLayer

  // "Colors used" remap: key = "r,g,b" of a color as it appears in the RAW
  // processed-image stage (post sampling/color-reduction, pre-remap) ->
  // {r,g,b} the user has remapped it to. Always keyed by that original raw
  // color so re-editing an already-remapped swatch composes cleanly instead
  // of chaining off the previously displayed value. Reset on new image load.
  let colorRemap = new Map();
  // Raw keys currently rendered in the "Colors used" strip, in order - lets
  // updateColorsUsedSwatches tell a live remap edit (same key set) apart
  // from a real pipeline change (different key set) and update swatches in
  // place rather than tearing down the DOM mid color-pick.
  let colorsUsedKeys = [];

  // "Reset colors": drop every remap, rebuild the strip with the raw colors.
  document.getElementById('resetColorsBtn').addEventListener('click', () => {
    colorRemap.clear();
    colorsUsedKeys = []; // force a full swatch rebuild on the next update
    processAll();
  });

  // ---------- UI toggles ----------

  // Collapsible panels: tap/click on a panel title toggles the panel down
  // to just its title bar. Clicks on controls living inside the label
  // (e.g. the Center button) don't toggle.
  document.querySelectorAll('.panel > .panel-label').forEach((label) => {
    label.addEventListener('click', (e) => {
      if (e.target.closest('button, input')) return;
      label.parentElement.classList.toggle('collapsed');
    });
  });

  bgToggle.addEventListener('change', () => {
    tolWrap.style.display = bgToggle.checked ? 'inline-flex' : 'none';
    processAll();
  });
  bgTolerance.addEventListener('input', () => {
    bgToleranceVal.textContent = bgTolerance.value;
    processAll();
  });
  const samplingButtons = Array.from(samplingSegmented.querySelectorAll('.segment'));
  samplingButtons.forEach((btn) => {
    btn.addEventListener('click', () => {
      samplingMode = btn.dataset.mode;
      samplingButtons.forEach((b) => b.classList.toggle('active', b === btn));
      processAll();
    });
  });

  const colorsButtons = Array.from(colorsSegmented.querySelectorAll('.segment'));
  colorsButtons.forEach((btn) => {
    btn.addEventListener('click', () => {
      colorsValue = btn.dataset.colors;
      colorsButtons.forEach((b) => b.classList.toggle('active', b === btn));
      processAll();
    });
  });

  ditherToggle.addEventListener('change', processAll);

  bgColorToggle.addEventListener('change', () => {
    bgColorInput.style.display = bgColorToggle.checked ? 'inline-block' : 'none';
    processAll();
  });
  bgColorInput.addEventListener('input', processAll);

  zoomSlider.addEventListener('input', () => {
    setZoom(parseFloat(zoomSlider.value));
  });

  centerBtn.addEventListener('click', () => {
    if (!sourceImage) return;
    cropOffsetX = 0;
    cropOffsetY = 0;
    processAll();
  });

  // ---------- hand-paint ----------

  // Simple monochrome pencil glyph (white fill, black outline so it reads on
  // both light and dark cells), tip at the bottom-left, hotspot pinned to
  // the tip via the "1 15" cursor offset. No standard CSS pencil cursor
  // exists, so this is an inline SVG data-URI; 'crosshair' is the fallback.
  const PENCIL_SVG = "<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'>" +
    "<polygon points='1,15 5,11 13,3 15,5 7,13' fill='white' stroke='black' stroke-width='1' stroke-linejoin='round'/>" +
    "<polygon points='1,15 5,11 3,13' fill='black'/>" +
    "</svg>";
  const PENCIL_CURSOR = 'url("data:image/svg+xml,' + encodeURIComponent(PENCIL_SVG) + '") 1 15, crosshair';
  const BUCKET_SVG = "<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'>" +
    "<path d='M7 1 L13 7 L7 13 L2 8 Z' fill='white' stroke='black' stroke-width='1' stroke-linejoin='round'/>" +
    "<path d='M13.5 10 q1.5 2.5 0 3.5 q-1.5 -1 0 -3.5' fill='black'/>" +
    "</svg>";
  const BUCKET_CURSOR = 'url("data:image/svg+xml,' + encodeURIComponent(BUCKET_SVG) + '") 7 13, crosshair';

  function applyActiveBrush() {
    for (const [btn, n] of [[brushBlack, 'black'], [brushWhite, 'white'], [brushColor, 'color'], [brushEraser, 'eraser']]) {
      btn.classList.toggle('active', activeBrush === n);
    }
    rightCanvas.style.cursor = activeBrush
      ? (paintTool === 'bucket' ? BUCKET_CURSOR : PENCIL_CURSOR)
      : 'default';
  }

  // Toggling version for the plain swatch buttons: clicking the already-
  // active brush deselects it (no brush).
  function setActiveBrush(name) {
    activeBrush = (activeBrush === name) ? null : name;
    applyActiveBrush();
  }

  // Non-toggling version, always activates (never turns off): needed for
  // the Custom color input, whose 'click' (opening the native picker) and
  // 'input' (confirming a color) events aren't guaranteed to fire exactly
  // once per interaction - with the toggling version, a second fire could
  // immediately flip the brush back off right after activating it, which
  // is exactly the "picks a color but then doesn't paint" bug.
  function activateBrush(name) {
    activeBrush = name;
    applyActiveBrush();
  }

  // Pencil/Bucket tool toggle: exactly one active at all times (unlike the
  // brush swatches, neither ever deselects itself).
  function setPaintTool(tool) {
    paintTool = tool;
    toolPencil.classList.toggle('active', tool === 'pencil');
    toolBucket.classList.toggle('active', tool === 'bucket');
    applyActiveBrush(); // cursor follows the tool
  }
  toolPencil.addEventListener('click', () => setPaintTool('pencil'));
  toolBucket.addEventListener('click', () => setPaintTool('bucket'));

  brushBlack.addEventListener('click', () => setActiveBrush('black'));
  brushWhite.addEventListener('click', () => setActiveBrush('white'));
  brushEraser.addEventListener('click', () => setActiveBrush('eraser'));

  // The color input sits invisibly on top of the brushColor swatch button
  // (see .brush-swatch-wrap CSS) so a single click both opens the native
  // picker (RGB/HEX inputs and all) and activates the brush; the swatch's
  // own click never fires once the input is layered above it. Activate on
  // 'pointerdown' too - it fires before the native picker even opens, so a
  // plain click (picker opened and closed with no color change, or not
  // opening at all in some browsers) still activates the brush immediately
  // with whatever color is already showing.
  brushColor.style.background = brushColorInput.value;
  brushColorInput.addEventListener('pointerdown', () => activateBrush('color'));
  brushColorInput.addEventListener('click', () => activateBrush('color'));
  brushColorInput.addEventListener('input', () => {
    brushColor.style.background = brushColorInput.value;
    activateBrush('color');
  });

  // Separate eyedropper button: the native color-input dialog above covers
  // the output panel, so it can't be used to sample a color off the output
  // image itself. This button uses the EyeDropper API instead, which can
  // sample any on-screen pixel, including the output canvas. Only shown
  // where the API is supported.
  if (window.EyeDropper) {
    brushEyedropper.addEventListener('click', () => {
      activateBrush('color');
      new EyeDropper().open()
        .then((result) => {
          brushColorInput.value = result.sRGBHex;
          brushColor.style.background = result.sRGBHex;
        })
        .catch((err) => {
          // AbortError = user pressed Esc; brush stays active with the
          // previous color. Ignore silently either way.
        });
    });
  } else {
    brushEyedropper.style.display = 'none';
  }

  function pushUndoSnapshot() {
    undoStack.push(paintLayer.slice());
    if (undoStack.length > UNDO_LIMIT) undoStack.shift();
    paintUndoBtn.disabled = undoStack.length === 0;
  }

  function undoPaint() {
    if (undoStack.length === 0) return;
    paintLayer = undoStack.pop();
    paintUndoBtn.disabled = undoStack.length === 0;
    processAll();
  }

  paintUndoBtn.addEventListener('click', undoPaint);

  document.addEventListener('keydown', (e) => {
    if (!(e.ctrlKey && e.key.toLowerCase() === 'z')) return;
    const tag = document.activeElement && document.activeElement.tagName;
    const isInInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' ||
      (document.activeElement && document.activeElement.isContentEditable);
    if (isInInput) return;
    e.preventDefault();
    undoPaint();
  });

  paintClearBtn.addEventListener('click', () => {
    pushUndoSnapshot();
    paintLayer.fill(null);
    processAll();
  });

  function updateCanvasModeUI() {
    paintCanvasBtn.title = CANVAS_MODE_TITLES[canvasMode];
    paintCanvasBtn.classList.toggle('active', canvasMode !== 'image');
  }

  // "Canvas" button: cycles the non-destructive base the paint layer sits
  // on top of (image -> transparent -> white -> black -> image). Never
  // touches paintLayer and never pushes an undo snapshot - purely a render
  // choice, not a paint action.
  paintCanvasBtn.addEventListener('click', () => {
    const idx = CANVAS_MODE_CYCLE.indexOf(canvasMode);
    canvasMode = CANVAS_MODE_CYCLE[(idx + 1) % CANVAS_MODE_CYCLE.length];
    updateCanvasModeUI();
    processAll();
  });
  updateCanvasModeUI();

  // Grid overlay: display-only aid, never touches the actual pixel data -
  // it's a separate absolutely-positioned layer over the canvas, not baked
  // into export/palette/Yoto preview.
  gridToggle.addEventListener('change', () => {
    gridOverlay.classList.toggle('on', gridToggle.checked);
  });

  function brushValue() {
    if (activeBrush === 'black') return { r: 0, g: 0, b: 0 };
    if (activeBrush === 'white') return { r: 255, g: 255, b: 255 };
    if (activeBrush === 'eraser') return 'erase';
    if (activeBrush === 'color') {
      const hex = brushColorInput.value;
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16)
      };
    }
    return null;
  }

  function paintAt(clientX, clientY) {
    const rect = rightCanvas.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return;
    const x = Math.floor((clientX - rect.left) / (rect.width / FINAL_SIZE));
    const y = Math.floor((clientY - rect.top) / (rect.height / FINAL_SIZE));
    if (x < 0 || y < 0 || x >= FINAL_SIZE || y >= FINAL_SIZE) return;
    const value = brushValue();
    if (value === null) return;
    paintLayer[y * FINAL_SIZE + x] = value;
    processAll();
  }

  // key for a cell's CURRENT VISIBLE color (what's actually on screen right
  // now - post color-reduction/remap/canvasMode/paint, whatever rightCanvas
  // holds at the moment of the click): fully transparent pixels are their
  // own group regardless of leftover RGB; otherwise exact RGBA.
  function visiblePixelKey(data, idx) {
    const pi = idx * 4;
    if (data[pi + 3] === 0) return 'transparent';
    return data[pi] + ',' + data[pi + 1] + ',' + data[pi + 2] + ',' + data[pi + 3];
  }

  // Bucket fill: 4-neighbor flood fill of the connected region matching the
  // clicked cell's current displayed color exactly, writing the active
  // brush's value into the paint layer for every cell in that region. Single
  // click only (no drag) - one undo snapshot per fill.
  function bucketFillAt(clientX, clientY) {
    const rect = rightCanvas.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return;
    const x = Math.floor((clientX - rect.left) / (rect.width / FINAL_SIZE));
    const y = Math.floor((clientY - rect.top) / (rect.height / FINAL_SIZE));
    if (x < 0 || y < 0 || x >= FINAL_SIZE || y >= FINAL_SIZE) return;
    const value = brushValue();
    if (value === null) return;

    const imgData = rightCtx.getImageData(0, 0, FINAL_SIZE, FINAL_SIZE);
    const data = imgData.data;
    const startIdx = y * FINAL_SIZE + x;
    const targetKey = visiblePixelKey(data, startIdx);

    pushUndoSnapshot(); // once per fill
    const visited = new Uint8Array(FINAL_SIZE * FINAL_SIZE);
    const stack = [startIdx];
    visited[startIdx] = 1;
    while (stack.length) {
      const idx = stack.pop();
      paintLayer[idx] = value;
      const cx = idx % FINAL_SIZE, cy = (idx - cx) / FINAL_SIZE;
      const neighbors = [[cx - 1, cy], [cx + 1, cy], [cx, cy - 1], [cx, cy + 1]];
      for (const [nx, ny] of neighbors) {
        if (nx < 0 || ny < 0 || nx >= FINAL_SIZE || ny >= FINAL_SIZE) continue;
        const nIdx = ny * FINAL_SIZE + nx;
        if (visited[nIdx]) continue;
        if (visiblePixelKey(data, nIdx) !== targetKey) continue;
        visited[nIdx] = 1;
        stack.push(nIdx);
      }
    }
    processAll();
  }

  // Pointer events (not mouse events) so touch painting works too;
  // setPointerCapture keeps the stroke tracking this element even once the
  // pointer moves outside its bounds during a fast drag.
  rightCanvas.addEventListener('pointerdown', (e) => {
    // No sourceImage gate: painting works standalone from page load, before
    // any image is ever loaded (see processAll's standalone branch).
    if (!activeBrush) return;
    if (paintTool === 'bucket') {
      // Single click only - no drag stroke for bucket fill.
      bucketFillAt(e.clientX, e.clientY);
      e.preventDefault();
      return;
    }
    pushUndoSnapshot(); // once per stroke, before this stroke's first change
    isPainting = true;
    try { rightCanvas.setPointerCapture(e.pointerId); } catch (_) {}
    paintAt(e.clientX, e.clientY);
    e.preventDefault();
  });

  rightCanvas.addEventListener('pointermove', (e) => {
    if (!isPainting) return;
    paintAt(e.clientX, e.clientY);
  });

  function endPaint(e) {
    isPainting = false;
    if (e && rightCanvas.hasPointerCapture(e.pointerId)) {
      rightCanvas.releasePointerCapture(e.pointerId);
    }
  }
  rightCanvas.addEventListener('pointerup', endPaint);
  rightCanvas.addEventListener('pointercancel', endPaint);

  // ---------- image loading ----------

  fileInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]);
  });

  leftBody.addEventListener('dragover', (e) => {
    e.preventDefault();
  });
  leftBody.addEventListener('drop', (e) => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (files && files[0]) loadFile(files[0]);
  });

  leftBody.addEventListener('wheel', (e) => {
    if (!sourceImage) return;
    e.preventDefault();
    setZoom(zoom + (e.deltaY > 0 ? -0.1 : 0.1));
  }, { passive: false });

  window.addEventListener('paste', (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
      if (item.type && item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) loadFile(file, 'yoto-icon');
        break;
      }
    }
  });

  function loadFile(file, forcedName) {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      cropOffsetX = 0;
      cropOffsetY = 0;
      zoom = 1;
      zoomSlider.value = '1';
      zoomVal.textContent = '1.0';
      paintLayer.fill(null);
      undoStack = [];
      paintUndoBtn.disabled = true;
      canvasMode = 'image';
      updateCanvasModeUI();
      colorRemap = new Map();
      colorsUsedKeys = [];

      let base = forcedName;
      if (!base) {
        base = (file.name || '').replace(/\.[^/.]+$/, '').trim();
        if (!base) base = 'yoto-icon';
      }
      filenameInput.value = base;

      URL.revokeObjectURL(url);
      dropHint.style.display = 'none';
      leftCanvas.style.display = 'block';
      rightCanvas.style.display = 'block';
      leftCanvas.style.cursor = 'grab';
      yotoHint.style.display = 'none';
      yotoCanvas.style.display = 'block';
      exportBtn.disabled = false;
      centerBtn.disabled = false;
      processAll();
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      alert('Could not load that file as an image.');
    };
    img.src = url;
  }

  // ---------- pipeline ----------

  function getCropSlack(img, z) {
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    const size = Math.min(iw, ih);
    const cropSize = size / z;
    return { iw, ih, size, cropSize, baseSx: (iw - cropSize) / 2, baseSy: (ih - cropSize) / 2 };
  }

  function centerCropSquare(img) {
    const { iw, ih, cropSize, baseSx, baseSy } = getCropSlack(img, zoom);
    // Round the crop rect to integer source pixels so it is pixel-exact:
    // fractional sx/sy/cropSize force the browser to bilinear-blend the
    // sampled corner pixels even at 1:1 scale, which drifts the flood-fill
    // seed color away from the true background color.
    const cs = Math.max(1, Math.round(cropSize));
    const sx = Math.round(baseSx - cropOffsetX);
    const sy = Math.round(baseSy - cropOffsetY);
    const workSize = Math.round(Math.min(cs, MAX_WORK_SIZE));
    const c = document.createElement('canvas');
    c.width = workSize;
    c.height = workSize;
    const ctx = c.getContext('2d');

    // The crop rect [sx, sx+cs) x [sy, sy+cs) can now extend outside the
    // image bounds (panning lets the user push the crop window fully off
    // an edge). Draw only the part that actually overlaps the image, at
    // the proportionally corresponding spot in the destination canvas, so
    // nothing gets stretched - area with no source coverage is left as-is,
    // which is transparent since a freshly created canvas starts fully
    // transparent.
    const ix0 = Math.max(0, sx);
    const iy0 = Math.max(0, sy);
    const ix1 = Math.min(iw, sx + cs);
    const iy1 = Math.min(ih, sy + cs);
    const overlapW = ix1 - ix0;
    const overlapH = iy1 - iy0;

    if (overlapW > 0 && overlapH > 0) {
      const scale = workSize / cs;
      const dx = (ix0 - sx) * scale;
      const dy = (iy0 - sy) * scale;
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(img, ix0, iy0, overlapW, overlapH, dx, dy, overlapW * scale, overlapH * scale);
    }
    return c;
  }

  function clampCropOffset() {
    if (!sourceImage) return;
    const { baseSx, baseSy, cropSize } = getCropSlack(sourceImage, zoom);
    // baseSx/baseSy go negative once zoom < 1 makes the crop window bigger
    // than the image itself - abs() keeps the clamp symmetric either way.
    const limX = Math.abs(baseSx) + cropSize;
    const limY = Math.abs(baseSy) + cropSize;
    cropOffsetX = Math.max(-limX, Math.min(limX, cropOffsetX));
    cropOffsetY = Math.max(-limY, Math.min(limY, cropOffsetY));
  }

  // Zoom slider is min 0.25 step 0.05 (0.25 + k*0.05 lands exactly on 1.00).
  // Snap to that grid ourselves too so repeated wheel taps can't drift off
  // it via floating point error.
  function formatZoom(z) {
    const s2 = z.toFixed(2);
    return s2.endsWith('0') ? z.toFixed(1) : s2; // "1.00" -> "1.0", "1.35" stays
  }

  function setZoom(z) {
    const ZOOM_STEP = 0.05;
    let snapped = Math.round(z / ZOOM_STEP) * ZOOM_STEP;
    snapped = Math.round(snapped * 100) / 100; // kill residual float noise
    zoom = Math.max(0.25, snapped);
    zoomSlider.value = Math.min(zoom, 5).toFixed(2); // slider caps at 5, wheel zoom doesn't
    zoomVal.textContent = formatZoom(zoom);
    if (sourceImage) {
      clampCropOffset();
      processAll();
    }
  }

  // ---------- drag to align crop ----------
  // Pointer events (not mouse events) so touch dragging works too;
  // setPointerCapture keeps the drag tracking this element even once the
  // pointer moves outside its bounds, so listeners can live on the canvas
  // itself instead of document.

  // Pinch zoom (mobile): all active pointers on the crop canvas are
  // tracked by id. Two fingers down switches from pan to pinch - zoom
  // scales by current/initial finger distance off the zoom at pinch start,
  // through the same setZoom (snap + clamp) as slider/wheel. Lifting
  // either finger ends the pinch; panning needs a fresh touch so the crop
  // doesn't jump to the leftover finger's stale drag baseline.
  const activePointers = new Map();
  let pinchStartDist = 0;
  let pinchStartZoom = 1;

  function pointerDist() {
    const [a, b] = [...activePointers.values()];
    return Math.hypot(a.x - b.x, a.y - b.y) || 1;
  }

  leftCanvas.addEventListener('pointerdown', (e) => {
    if (!sourceImage) return;
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (activePointers.size === 2) {
      isDragging = false; // pan -> pinch
      pinchStartDist = pointerDist();
      pinchStartZoom = zoom;
    } else if (activePointers.size === 1) {
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragStartOffsetX = cropOffsetX;
      dragStartOffsetY = cropOffsetY;
      leftCanvas.style.cursor = 'grabbing';
    }
    try { leftCanvas.setPointerCapture(e.pointerId); } catch (_) {}
    e.preventDefault();
  });

  leftCanvas.addEventListener('pointermove', (e) => {
    if (!sourceImage) return;
    if (activePointers.has(e.pointerId)) {
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    }
    if (activePointers.size >= 2) {
      setZoom(pinchStartZoom * (pointerDist() / pinchStartDist));
      return;
    }
    if (!isDragging) return;
    const rect = leftCanvas.getBoundingClientRect();
    const { cropSize, baseSx, baseSy } = getCropSlack(sourceImage, zoom);
    const scaleX = rect.width > 0 ? cropSize / rect.width : 1;
    const scaleY = rect.height > 0 ? cropSize / rect.height : 1;
    const deltaPxX = e.clientX - dragStartX;
    const deltaPxY = e.clientY - dragStartY;
    const limX = Math.abs(baseSx) + cropSize;
    const limY = Math.abs(baseSy) + cropSize;

    let newOffsetX = dragStartOffsetX + deltaPxX * scaleX;
    let newOffsetY = dragStartOffsetY + deltaPxY * scaleY;
    newOffsetX = Math.max(-limX, Math.min(limX, newOffsetX));
    newOffsetY = Math.max(-limY, Math.min(limY, newOffsetY));

    cropOffsetX = newOffsetX;
    cropOffsetY = newOffsetY;
    processAll();
  });

  function endDrag(e) {
    if (e) activePointers.delete(e.pointerId);
    if (isDragging) {
      isDragging = false;
      if (sourceImage) leftCanvas.style.cursor = 'grab';
    }
    if (e && leftCanvas.hasPointerCapture(e.pointerId)) {
      leftCanvas.releasePointerCapture(e.pointerId);
    }
  }
  leftCanvas.addEventListener('pointerup', endDrag);
  leftCanvas.addEventListener('pointercancel', endDrag);

  function colorDistance(r1, g1, b1, r2, g2, b2) {
    const dr = r1 - r2, dg = g1 - g2, db = b1 - b2;
    return Math.sqrt(dr * dr + dg * dg + db * db);
  }

  function sampleSeedColor(data, width, height, cx, cy) {
    // Average a small patch around the corner instead of trusting a single
    // pixel - a lone anti-aliased/noisy/compression-artifact pixel right at
    // the corner can otherwise seed the fill with an off color and make the
    // whole flood fill fail to match anything. Fully transparent pixels
    // (e.g. crop area panned outside the source image) are excluded so
    // their zeroed-out RGB never pulls the seed toward black.
    const RADIUS = 1;
    let rSum = 0, gSum = 0, bSum = 0, count = 0;
    for (let dy = -RADIUS; dy <= RADIUS; dy++) {
      for (let dx = -RADIUS; dx <= RADIUS; dx++) {
        const x = cx + dx, y = cy + dy;
        if (x < 0 || y < 0 || x >= width || y >= height) continue;
        const idx = (y * width + x) * 4;
        if (data[idx + 3] === 0) continue;
        rSum += data[idx]; gSum += data[idx + 1]; bSum += data[idx + 2];
        count++;
      }
    }
    if (count === 0) return null;
    return { r: rSum / count, g: gSum / count, b: bSum / count };
  }

  function removeBackground(imageData, tolerancePct) {
    const { width, height, data } = imageData;
    const threshold = (tolerancePct / 100) * 441.7;
    const visited = new Uint8Array(width * height);
    const corners = [
      [0, 0], [width - 1, 0], [0, height - 1], [width - 1, height - 1]
    ];

    for (const [cx, cy] of corners) {
      const startIdx = cy * width + cx;
      if (visited[startIdx]) continue;
      // A corner that's already fully transparent (crop panned outside the
      // source image) has no real color to seed with - skip it, it's
      // already transparent so there's nothing to remove there anyway.
      if (data[startIdx * 4 + 3] === 0) continue;
      const seed = sampleSeedColor(data, width, height, cx, cy);
      if (!seed) continue;
      const sr = seed.r, sg = seed.g, sb = seed.b;

      const stack = [[cx, cy]];
      visited[startIdx] = 1;

      while (stack.length) {
        const [x, y] = stack.pop();
        const pi = (y * width + x) * 4;
        data[pi + 3] = 0;

        const neighbors = [[x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]];
        for (const [nx, ny] of neighbors) {
          if (nx < 0 || ny < 0 || nx >= width || ny >= height) continue;
          const nidx = ny * width + nx;
          if (visited[nidx]) continue;
          const npi = nidx * 4;
          if (data[npi + 3] === 0) {
            // Already transparent - nothing to remove, don't let its
            // zeroed RGB feed into the flood match.
            visited[nidx] = 1;
            continue;
          }
          const dist = colorDistance(data[npi], data[npi + 1], data[npi + 2], sr, sg, sb);
          if (dist <= threshold) {
            visited[nidx] = 1;
            stack.push([nx, ny]);
          }
        }
      }
    }
    return imageData;
  }

  function getRanges(box) {
    let rMin = 255, rMax = 0, gMin = 255, gMax = 0, bMin = 255, bMax = 0;
    for (const p of box) {
      if (p.r < rMin) rMin = p.r;
      if (p.r > rMax) rMax = p.r;
      if (p.g < gMin) gMin = p.g;
      if (p.g > gMax) gMax = p.g;
      if (p.b < bMin) bMin = p.b;
      if (p.b > bMax) bMax = p.b;
    }
    return { r: rMax - rMin, g: gMax - gMin, b: bMax - bMin };
  }

  function averageColor(box) {
    let r = 0, g = 0, b = 0;
    for (const p of box) { r += p.r; g += p.g; b += p.b; }
    const n = box.length;
    return { r: Math.round(r / n), g: Math.round(g / n), b: Math.round(b / n) };
  }

  function medianCutQuantize(pixels, numColors) {
    let boxes = [pixels];
    while (boxes.length < numColors) {
      let boxIndex = -1, maxRange = -1, channel = 'r';
      for (let i = 0; i < boxes.length; i++) {
        const box = boxes[i];
        if (box.length < 2) continue;
        const ranges = getRanges(box);
        const m = Math.max(ranges.r, ranges.g, ranges.b);
        if (m > maxRange) {
          maxRange = m;
          boxIndex = i;
          channel = ranges.r === m ? 'r' : (ranges.g === m ? 'g' : 'b');
        }
      }
      if (boxIndex === -1) break;
      const box = boxes[boxIndex];
      box.sort((a, b) => a[channel] - b[channel]);
      const mid = Math.floor(box.length / 2);
      const box1 = box.slice(0, mid);
      const box2 = box.slice(mid);
      boxes.splice(boxIndex, 1, box1, box2);
    }
    return boxes.filter(b => b.length > 0).map(averageColor);
  }

  function nearestPaletteColor(r, g, b, palette) {
    let best = palette[0], bestDist = Infinity;
    for (const c of palette) {
      const dr = r - c.r, dg = g - c.g, db = b - c.b;
      const dist = dr * dr + dg * dg + db * db;
      if (dist < bestDist) { bestDist = dist; best = c; }
    }
    return best;
  }

  function applyColorReduction(imageData, numColors) {
    const { data } = imageData;
    const pixels = [];
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] > 0) pixels.push({ r: data[i], g: data[i + 1], b: data[i + 2] });
    }
    if (pixels.length === 0) return imageData;
    const palette = medianCutQuantize(pixels, numColors);
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] > 0) {
        const c = nearestPaletteColor(data[i], data[i + 1], data[i + 2], palette);
        data[i] = c.r; data[i + 1] = c.g; data[i + 2] = c.b;
      }
    }
    return imageData;
  }

  function medianOf(arr) {
    const s = arr.slice().sort((a, b) => a - b);
    return s[Math.floor(s.length / 2)];
  }

  // Downscales srcImageData to targetSize x targetSize by picking, per
  // output cell, either the dominant (most-frequent, near-duplicates
  // bucketed) color or the per-channel median color among that cell's
  // opaque source pixels. A cell with >50% transparent source pixels comes
  // out transparent; fully transparent pixels never vote either way.
  function cellSample(srcImageData, targetSize, mode) {
    const sw = srcImageData.width, sh = srcImageData.height, sd = srcImageData.data;
    const out = new ImageData(targetSize, targetSize);
    const od = out.data;

    for (let ty = 0; ty < targetSize; ty++) {
      const y0 = Math.floor(ty * sh / targetSize);
      const y1 = Math.max(y0 + 1, Math.floor((ty + 1) * sh / targetSize));
      for (let tx = 0; tx < targetSize; tx++) {
        const x0 = Math.floor(tx * sw / targetSize);
        const x1 = Math.max(x0 + 1, Math.floor((tx + 1) * sw / targetSize));

        let total = 0, transparentCount = 0;
        const rs = [], gs = [], bs = [];
        for (let y = y0; y < y1; y++) {
          for (let x = x0; x < x1; x++) {
            const idx = (y * sw + x) * 4;
            total++;
            if (sd[idx + 3] === 0) { transparentCount++; continue; }
            rs.push(sd[idx]); gs.push(sd[idx + 1]); bs.push(sd[idx + 2]);
          }
        }

        if (total === 0 || transparentCount / total > 0.5) continue; // stays transparent (ImageData starts zeroed)

        let r, g, b;
        if (mode === 'median') {
          r = medianOf(rs); g = medianOf(gs); b = medianOf(bs);
        } else {
          // dominant: bucket by quantizing each channel to 16 levels so
          // near-duplicate colors count as one vote, then average the
          // actual pixels that fell in the winning bucket
          const buckets = new Map();
          for (let i = 0; i < rs.length; i++) {
            const key = (rs[i] >> 4) + ',' + (gs[i] >> 4) + ',' + (bs[i] >> 4);
            let e = buckets.get(key);
            if (!e) { e = { count: 0, rSum: 0, gSum: 0, bSum: 0 }; buckets.set(key, e); }
            e.count++; e.rSum += rs[i]; e.gSum += gs[i]; e.bSum += bs[i];
          }
          let best = null;
          for (const e of buckets.values()) { if (!best || e.count > best.count) best = e; }
          r = Math.round(best.rSum / best.count);
          g = Math.round(best.gSum / best.count);
          b = Math.round(best.bSum / best.count);
        }

        const oi = (ty * targetSize + tx) * 4;
        od[oi] = r; od[oi + 1] = g; od[oi + 2] = b; od[oi + 3] = 255;
      }
    }
    return out;
  }

  // Floyd-Steinberg dithered version of applyColorReduction: same
  // median-cut palette, but quantization error is diffused to neighboring
  // pixels instead of just nearest-mapping each pixel in isolation.
  // Transparent pixels neither dither themselves nor receive diffused error.
  function applyColorReductionDither(imageData, numColors) {
    const { data, width, height } = imageData;
    const pixels = [];
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] > 0) pixels.push({ r: data[i], g: data[i + 1], b: data[i + 2] });
    }
    if (pixels.length === 0) return imageData;
    const palette = medianCutQuantize(pixels, numColors);

    const n = width * height;
    const rBuf = new Float32Array(n), gBuf = new Float32Array(n), bBuf = new Float32Array(n);
    for (let p = 0; p < n; p++) {
      const i = p * 4;
      rBuf[p] = data[i]; gBuf[p] = data[i + 1]; bBuf[p] = data[i + 2];
    }

    function isOpaque(x, y) {
      if (x < 0 || y < 0 || x >= width || y >= height) return false;
      return data[(y * width + x) * 4 + 3] > 0;
    }
    function addErr(x, y, er, eg, eb) {
      if (!isOpaque(x, y)) return;
      const p = y * width + x;
      rBuf[p] += er; gBuf[p] += eg; bBuf[p] += eb;
    }

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const i = (y * width + x) * 4;
        if (data[i + 3] === 0) continue;
        const p = y * width + x;
        const oldR = rBuf[p], oldG = gBuf[p], oldB = bBuf[p];
        const c = nearestPaletteColor(
          Math.max(0, Math.min(255, oldR)),
          Math.max(0, Math.min(255, oldG)),
          Math.max(0, Math.min(255, oldB)),
          palette
        );
        data[i] = c.r; data[i + 1] = c.g; data[i + 2] = c.b;
        const errR = oldR - c.r, errG = oldG - c.g, errB = oldB - c.b;
        addErr(x + 1, y, errR * 7 / 16, errG * 7 / 16, errB * 7 / 16);
        addErr(x - 1, y + 1, errR * 3 / 16, errG * 3 / 16, errB * 3 / 16);
        addErr(x, y + 1, errR * 5 / 16, errG * 5 / 16, errB * 5 / 16);
        addErr(x + 1, y + 1, errR * 1 / 16, errG * 1 / 16, errB * 1 / 16);
      }
    }
    return imageData;
  }

  function processAll() {
    if (!sourceImage) {
      // Standalone pixel-editor mode: no image loaded (yet). Skip the whole
      // crop/bg-removal/pixelate/color-reduction pipeline - the output is
      // just the base (blank, or a solid canvasMode color) plus the
      // hand-paint layer, with the same optional BG-color compositing as
      // the real pipeline's last stage. 'image' and 'transparent' modes are
      // equivalent here: there's no processed image, so the base is
      // empty/transparent either way.
      rightCtx.clearRect(0, 0, FINAL_SIZE, FINAL_SIZE);
      if (canvasMode === 'white' || canvasMode === 'black') {
        rightCtx.fillStyle = canvasMode === 'white' ? '#ffffff' : '#000000';
        rightCtx.fillRect(0, 0, FINAL_SIZE, FINAL_SIZE);
      }
      applyPaintLayer();
      if (bgColorToggle.checked) {
        rightCtx.save();
        rightCtx.globalCompositeOperation = 'destination-over';
        rightCtx.fillStyle = bgColorInput.value;
        rightCtx.fillRect(0, 0, FINAL_SIZE, FINAL_SIZE);
        rightCtx.restore();
      }
      updateSwatches();
      updateColorsUsedSwatches(null);
      renderYotoPreview();
      return;
    }

    // 1. square crop
    const squareCanvas = centerCropSquare(sourceImage);
    const S = squareCanvas.width;

    // 2. background removal (left panel reflects this too)
    let leftResult = squareCanvas;
    if (bgToggle.checked) {
      const ctx = squareCanvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, S, S);
      removeBackground(imgData, parseInt(bgTolerance.value, 10));
      ctx.putImageData(imgData, 0, 0);
      leftResult = squareCanvas;
    }

    leftCanvas.width = S;
    leftCanvas.height = S;
    leftCtx.clearRect(0, 0, S, S);
    leftCtx.drawImage(leftResult, 0, 0);
    // Tiny pixel-art sources otherwise look blurry: the browser bilinear-
    // upscales a small backing canvas to fill the larger CSS display box.
    // Switch to nearest-neighbor display only when actually upscaling;
    // normal photos (backing >= displayed size) keep smooth scaling.
    leftCanvas.style.imageRendering = (leftCanvas.width < leftCanvas.clientWidth) ? 'pixelated' : '';

    // 3. downscale straight to the true 16x16 icon, in one step, honoring
    // the selected Sampling mode - no intermediate canvas. Dominant/median
    // are cell-based statistical downscales (cellSample); Smooth/Nearest
    // are a single drawImage with imageSmoothingEnabled toggled.
    const cellMode = samplingMode === 'dominant' || samplingMode === 'median';
    rightCtx.clearRect(0, 0, FINAL_SIZE, FINAL_SIZE);
    if (cellMode) {
      const srcData = leftResult.getContext('2d').getImageData(0, 0, S, S);
      rightCtx.putImageData(cellSample(srcData, FINAL_SIZE, samplingMode), 0, 0);
    } else {
      rightCtx.imageSmoothingEnabled = samplingMode === 'smooth';
      rightCtx.drawImage(leftResult, 0, 0, S, S, 0, 0, FINAL_SIZE, FINAL_SIZE);
    }

    // Pure sampled-input snapshot - straight off the downscale, before
    // color reduction/dither/remap touch anything. This is what "Most-used
    // colors" reads: changing Colors or Dither must never change that
    // strip, only the actual output and "Output color map" do.
    const preReductionImageData = rightCtx.getImageData(0, 0, FINAL_SIZE, FINAL_SIZE);

    // 4. color reduction (+ optional dither) - runs on the TRUE 16x16
    // stage, right after the downscale. Quantizing at the true output
    // resolution is the only way "Colors=X" genuinely guarantees <=X
    // unique colors in the final icon.
    const reduceVal = colorsValue;
    if (reduceVal !== 'off') {
      const imgData = rightCtx.getImageData(0, 0, FINAL_SIZE, FINAL_SIZE);
      if (ditherToggle.checked) {
        applyColorReductionDither(imgData, parseInt(reduceVal, 10));
      } else {
        applyColorReduction(imgData, parseInt(reduceVal, 10));
      }
      rightCtx.putImageData(imgData, 0, 0);
    }

    // Raw processed-image colors, pre-remap - this is the stable identity
    // the "Colors used" swatches are keyed on (see updateColorsUsedSwatches),
    // so re-editing an already-remapped swatch always resolves back to the
    // same original color instead of chaining off whatever it currently
    // displays.
    const rawImageData = rightCtx.getImageData(0, 0, FINAL_SIZE, FINAL_SIZE);

    // 4a. color remap - user edits from the "Output color map" swatches,
    // applied directly on the processed 16x16 image: every pixel whose
    // exact RGB matches a remapped original color is replaced with its
    // target color. Runs after color reduction, before the canvasMode base
    // override and before paint.
    applyColorRemap(rightCtx);

    updateColorsUsedSwatches(rawImageData);

    // 4b. canvas base-mode override - the "Canvas" toolbar button lets the
    // user ignore/hide the processed input image and paint on a blank or
    // solid base instead, without ever touching the paint layer itself.
    if (canvasMode === 'transparent') {
      rightCtx.clearRect(0, 0, FINAL_SIZE, FINAL_SIZE);
    } else if (canvasMode === 'white' || canvasMode === 'black') {
      rightCtx.clearRect(0, 0, FINAL_SIZE, FINAL_SIZE);
      rightCtx.fillStyle = canvasMode === 'white' ? '#ffffff' : '#000000';
      rightCtx.fillRect(0, 0, FINAL_SIZE, FINAL_SIZE);
    }

    // 6. hand-paint overlay - applied BEFORE the background color, not
    // after: erase punches a real transparent hole here, and the
    // background color (next, if on) sits underneath it like any other
    // transparency. With BG color off, that hole is the final result.
    applyPaintLayer();

    // 7. optional background color - the actual last stage. Composited via
    // destination-over so it only shows through transparency - original
    // cutout areas AND erased paint cells alike - never overwriting opaque
    // pixels.
    if (bgColorToggle.checked) {
      rightCtx.save();
      rightCtx.globalCompositeOperation = 'destination-over';
      rightCtx.fillStyle = bgColorInput.value;
      rightCtx.fillRect(0, 0, FINAL_SIZE, FINAL_SIZE);
      rightCtx.restore();
    }

    updateSwatches(preReductionImageData);
    renderYotoPreview();
  }

  function applyPaintLayer() {
    if (paintLayer.every((v) => v === null)) return;
    const imgData = rightCtx.getImageData(0, 0, FINAL_SIZE, FINAL_SIZE);
    const data = imgData.data;
    for (let idx = 0; idx < paintLayer.length; idx++) {
      const v = paintLayer[idx];
      if (v === null) continue;
      const pi = idx * 4;
      if (v === 'erase') {
        data[pi] = 0; data[pi + 1] = 0; data[pi + 2] = 0; data[pi + 3] = 0;
      } else {
        data[pi] = v.r; data[pi + 1] = v.g; data[pi + 2] = v.b; data[pi + 3] = 255;
      }
    }
    rightCtx.putImageData(imgData, 0, 0);
  }

  // ---------- palette / swatches ----------

  function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
  }

  // overrideImageData: when set, the palette is computed from this data
  // instead of the current rightCanvas content. In the normal sourceImage
  // pipeline this is always the pure sampled-input snapshot taken right
  // after the downscale, before color reduction/dither/remap/canvasMode/
  // paint touch anything - so "Most-used colors" reflects only crop + bg
  // removal + sampling mode, and never changes when Colors/Dither/Output
  // color map/Canvas/paint change. In standalone mode (no override, no
  // sourceImage) it falls back to reading the actual painted rightCanvas.
  function updateSwatches(overrideImageData) {
    const imgData = overrideImageData || rightCtx.getImageData(0, 0, FINAL_SIZE, FINAL_SIZE);
    const data = imgData.data;
    const counts = new Map();
    let opaqueTotal = 0;

    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] === 0) continue;
      opaqueTotal++;
      const key = data[i] + ',' + data[i + 1] + ',' + data[i + 2];
      counts.set(key, (counts.get(key) || 0) + 1);
    }

    const sorted = Array.from(counts.entries()).sort((a, b) => b[1] - a[1]).slice(0, 8);

    swatchesEl.innerHTML = '';
    for (const [key, count] of sorted) {
      const [r, g, b] = key.split(',').map(Number);
      const hex = rgbToHex(r, g, b);
      const pct = opaqueTotal > 0 ? ((count / opaqueTotal) * 100).toFixed(1) : '0.0';

      const el = document.createElement('div');
      el.className = 'swatch';
      el.innerHTML =
        '<span class="chip" style="background:' + hex + '"></span>' +
        '<span class="hex">' + hex + '</span>' +
        '<span class="pct">' + pct + '%</span>';
      el.addEventListener('click', () => {
        navigator.clipboard.writeText(hex).then(() => showToast('Copied ' + hex));
        brushColorInput.value = hex;
        brushColor.style.background = hex;
        activateBrush('color');
      });
      swatchesEl.appendChild(el);
    }
  }

  // Applies the persistent colorRemap to a 16x16 canvas in place: every
  // opaque pixel whose exact RGB matches a remapped original color is
  // replaced with its current target color. No-op (and no read/write) when
  // there are no remaps yet.
  function applyColorRemap(ctx) {
    if (colorRemap.size === 0) return;
    const imgData = ctx.getImageData(0, 0, FINAL_SIZE, FINAL_SIZE);
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] === 0) continue;
      const key = data[i] + ',' + data[i + 1] + ',' + data[i + 2];
      const target = colorRemap.get(key);
      if (target) {
        data[i] = target.r; data[i + 1] = target.g; data[i + 2] = target.b;
      }
    }
    ctx.putImageData(imgData, 0, 0);
  }

  function colorsUsedDisplayHex(key) {
    const target = colorRemap.get(key);
    if (target) return rgbToHex(target.r, target.g, target.b);
    const [r, g, b] = key.split(',').map(Number);
    return rgbToHex(r, g, b);
  }

  function buildColorUsedSwatch(key) {
    const hex = colorsUsedDisplayHex(key);
    const el = document.createElement('div');
    el.className = 'swatch-edit';
    el.innerHTML =
      '<span class="chip-wrap">' +
        '<span class="chip" style="background:' + hex + '"></span>' +
        '<input type="color" value="' + hex + '">' +
      '</span>' +
      '<span class="hex">' + hex + '</span>';
    const chip = el.querySelector('.chip');
    const hexLabel = el.querySelector('.hex');
    const input = el.querySelector('input[type="color"]');
    // 'input' (not 'change') for live updates while dragging in the native
    // picker - keyed by the ORIGINAL raw color (key, closed over here), so
    // re-editing this same swatch again just overwrites its remap target
    // rather than chaining off whatever it currently displays.
    input.addEventListener('input', () => {
      const val = input.value;
      const target = {
        r: parseInt(val.slice(1, 3), 16),
        g: parseInt(val.slice(3, 5), 16),
        b: parseInt(val.slice(5, 7), 16)
      };
      colorRemap.set(key, target);
      chip.style.background = val;
      hexLabel.textContent = val;
      processAll();
    });
    return el;
  }

  // rawImageData: the 16x16 processed-image stage, pre-remap. Builds/updates
  // the "Colors used" strip - ALL unique colors of that stage (max 256 on a
  // 16x16 image), frequency-sorted, each an editable swatch that registers a remap
  // and reprocesses live. When the same set of raw colors is still current
  // (i.e. this call is a live remap edit, not a real pipeline change), the
  // existing swatch DOM nodes are updated in place instead of rebuilt, so an
  // open native color-picker popup isn't torn down mid-drag by its own
  // 'input' event.
  function updateColorsUsedSwatches(rawImageData) {
    const countEl = document.getElementById('colorMapCount');
    if (!rawImageData) {
      colorsUsedEl.innerHTML = '';
      colorsUsedKeys = [];
      countEl.textContent = '';
      return;
    }

    const counts = new Map();
    const data = rawImageData.data;
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] === 0) continue;
      const key = data[i] + ',' + data[i + 1] + ',' + data[i + 2];
      counts.set(key, (counts.get(key) || 0) + 1);
    }
    countEl.textContent = ' (' + counts.size + (counts.size === 1 ? ' color)' : ' colors)');
    // The output is only ever 16x16 = at most 256 pixels, so the deduped
    // unique-color list is small by construction. Show ALL of them,
    // frequency-sorted - no cap, no grouping. Every swatch edits exactly
    // its own color and nothing else.
    const newKeys = Array.from(counts.entries())
      .sort((a, b) => b[1] - a[1])
      .map(([key]) => key);

    const sameSet = newKeys.length === colorsUsedKeys.length &&
      newKeys.every((k, i) => k === colorsUsedKeys[i]);

    if (!sameSet) {
      colorsUsedEl.innerHTML = '';
      colorsUsedKeys = newKeys;
      for (const key of newKeys) {
        colorsUsedEl.appendChild(buildColorUsedSwatch(key));
      }
      return;
    }

    const nodes = colorsUsedEl.children;
    for (let i = 0; i < newKeys.length; i++) {
      const key = newKeys[i];
      const el = nodes[i];
      if (!el) continue;
      const hex = colorsUsedDisplayHex(key);
      const chip = el.querySelector('.chip');
      const hexLabel = el.querySelector('.hex');
      const input = el.querySelector('input[type="color"]');
      chip.style.background = hex;
      hexLabel.textContent = hex;
      if (document.activeElement !== input) input.value = hex;
    }
  }

  // ---------- yoto box preview ----------

  function renderYotoPreview() {
    // No sourceImage gate: renders the (possibly empty/hand-painted) icon
    // as soon as the mockup photo itself has loaded.
    if (!yotoPhotoLoaded) return;
    yotoCtx.clearRect(0, 0, yotoCanvas.width, yotoCanvas.height);
    yotoCtx.drawImage(yotoPhoto, 0, 0);
    yotoCtx.imageSmoothingEnabled = false;
    yotoCtx.drawImage(
      rightCanvas, 0, 0, FINAL_SIZE, FINAL_SIZE,
      YOTO_DRAW_X, YOTO_DRAW_Y, YOTO_ICON_SIZE, YOTO_ICON_SIZE
    );
  }

  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1400);
  }

  // ---------- export ----------

  function sanitizeFilename(name) {
    let n = (name || '').trim();
    n = n.replace(/[\\/:*?"<>|]/g, '');
    n = n.trim();
    if (!n) n = 'yoto-icon';
    return n;
  }

  // Enter in the filename field = clicking .png
  filenameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !exportBtn.disabled) exportBtn.click();
  });

  exportBtn.addEventListener('click', () => {
    rightCanvas.toBlob((blob) => {
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = sanitizeFilename(filenameInput.value) + '.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 'image/png');
  });
})();
</script>

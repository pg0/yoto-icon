<title>Yoto Icon Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #16171a;
    --panel: #1e2024;
    --panel-border: #2c2f36;
    --text: #e6e6e6;
    --text-dim: #9a9ea6;
    --accent: #5aa9ff;
    --accent-text: #0b1420;
    --checker-a: #2a2d32;
    --checker-b: #34373d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--panel-border);
  }
  header h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  header p {
    margin: 4px 0 0;
    color: var(--text-dim);
    font-size: 12px;
  }
  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 16px 20px 40px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 18px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .control-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .control-group input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
  }
  .control-group select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    padding: 4px 6px;
    font-size: 13px;
  }
  .control-group input[type="range"] {
    accent-color: var(--accent);
    width: 100px;
  }
  .sub-value {
    color: var(--text-dim);
    font-size: 12px;
    min-width: 28px;
  }
  .file-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  button, .file-btn {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  button.secondary, .file-btn {
    background: var(--panel-border);
    color: var(--text);
  }
  .center-btn {
    padding: 3px 8px;
    font-size: 10px;
    border-radius: 4px;
  }
  .segmented {
    display: inline-flex;
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    overflow: hidden;
  }
  .segmented .segment {
    background: var(--bg);
    color: var(--text);
    border: none;
    border-radius: 0;
    border-right: 1px solid var(--panel-border);
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .segmented .segment:last-child {
    border-right: none;
  }
  .segmented .segment.active {
    background: var(--accent);
    color: var(--accent-text);
  }
  .paint-toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--panel-border);
  }
  .brush-swatch {
    width: 22px;
    height: 22px;
    padding: 0;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    background-color: var(--panel-border);
  }
  .brush-swatch.active {
    border-color: var(--accent);
  }
  .brush-black { background-color: #000; }
  .brush-white { background-color: #fff; }
  .brush-eraser {
    background-image:
      linear-gradient(45deg, #888 25%, transparent 25%),
      linear-gradient(-45deg, #888 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #888 75%),
      linear-gradient(-45deg, transparent 75%, #888 75%);
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
    background-color: #ccc;
  }
  .brush-swatch-wrap {
    position: relative;
    width: 22px;
    height: 22px;
    display: inline-block;
  }
  .brush-swatch-wrap .brush-swatch {
    width: 100%;
    height: 100%;
  }
  .brush-swatch-wrap input[type="color"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    padding: 0;
    border: none;
  }
  .file-controls input[type="text"] {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    padding: 4px 6px;
    font-size: 13px;
    width: 140px;
  }
  input[type="file"] { display: none; }
  .panels {
    /* Flow box: three equal panels side by side, wrapping to fewer columns on
       narrow screens so the layout works on mobile. */
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }
  .panel {
    flex: 1 1 240px;
    min-width: 220px;
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--panel);
  }
  .panel-label {
    padding: 8px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--panel-border);
  }
  .panel-body {
    position: relative;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      linear-gradient(45deg, var(--checker-a) 25%, transparent 25%),
      linear-gradient(-45deg, var(--checker-a) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--checker-a) 75%),
      linear-gradient(-45deg, transparent 75%, var(--checker-a) 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    background-color: var(--checker-b);
  }
  .yoto-preview-body {
    /* Same square footprint as Original/Output so all three panels line up;
       no checkerboard - the device photo brings its own background. */
    background-image: none;
    background-color: var(--panel);
    padding: 12px;
  }
  #yotoCanvas {
    max-width: 100%;
    max-height: 100%;
    height: auto;
    display: none;
  }
  #leftCanvas {
    width: 90%;
    height: 90%;
    display: none;
    touch-action: none;
  }
  #rightCanvas {
    width: 90%;
    height: 90%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    display: none;
    touch-action: none;
  }
  .drop-hint {
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    padding: 20px;
    pointer-events: none;
  }
  .palette-strip {
    margin-top: 16px;
  }
  .attribution {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .attribution a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px dotted var(--text-dim);
  }
  .attribution a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .palette-strip h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    font-weight: 600;
    margin: 0 0 8px;
  }
  .swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .swatch {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  .swatch:hover {
    border-color: var(--accent);
  }
  .swatch .chip {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .swatch .hex {
    color: var(--text);
  }
  .swatch .pct {
    color: var(--text-dim);
  }
  .toast {
    display: inline-block;
    margin-left: 8px;
    font-size: 12px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 900px) {
    .panels {
      flex-direction: column;
    }
    .panel {
      flex: 1 1 auto;
      min-width: 0;
      width: 100%;
    }
    .controls {
      gap: 10px;
    }
    .control-group {
      flex: 1 1 auto;
    }
    .file-controls {
      flex: 1 1 100%;
      margin-left: 0;
    }
    .file-controls input[type="text"] {
      width: 100px;
    }
  }
</style>

<header>
  <h1>Yoto Icon Maker</h1>
  <p>Load an image, tweak it, export a 16x16 PNG icon.</p>
</header>

<main>
  <div class="controls">
    <div class="control-group">
      <label><input type="checkbox" id="bgToggle"> Remove background</label>
      <span id="tolWrap" style="display:none; align-items:center; gap:6px;">
        <span class="sub-value">Tolerance</span>
        <input type="range" id="bgTolerance" min="0" max="50" value="30">
        <span class="sub-value" id="bgToleranceVal">30</span>
      </span>
    </div>

    <div class="control-group">
      <label><input type="checkbox" id="pixelToggle"> Pixelate</label>
      <span id="gridWrap" style="display:none; align-items:center; gap:6px;">
        <span class="sub-value">Grid</span>
        <select id="pixelGrid">
          <option value="16" selected>16</option>
          <option value="24">24</option>
          <option value="32">32</option>
          <option value="48">48</option>
          <option value="64">64</option>
          <option value="96">96</option>
          <option value="128">128</option>
        </select>
      </span>
    </div>

    <div class="control-group">
      <span class="sub-value">Sampling</span>
      <div class="segmented" id="samplingSegmented">
        <button type="button" class="segment active" data-mode="smooth">Smooth</button>
        <button type="button" class="segment" data-mode="nearest">Nearest</button>
        <button type="button" class="segment" data-mode="dominant">Dominant</button>
        <button type="button" class="segment" data-mode="median">Median</button>
      </div>
    </div>

    <div class="control-group">
      <span class="sub-value">Colors</span>
      <select id="colorReduce">
        <option value="off" selected>off</option>
        <option value="4">4</option>
        <option value="8">8</option>
        <option value="16">16</option>
        <option value="32">32</option>
      </select>
      <label><input type="checkbox" id="ditherToggle"> Dither</label>
    </div>

    <div class="control-group">
      <label><input type="checkbox" id="bgColorToggle"> BG color</label>
      <input type="color" id="bgColorInput" value="#000000" style="display:none;">
    </div>

    <div class="control-group">
      <span class="sub-value">Zoom</span>
      <input type="range" id="zoomSlider" min="0.25" max="5" step="0.05" value="1">
      <span class="sub-value" id="zoomVal">1.0</span>
    </div>

    <div class="file-controls">
      <label class="file-btn" for="fileInput">Choose file</label>
      <input type="file" id="fileInput" accept="image/*">
      <input type="text" id="filenameInput" placeholder="filename">
      <button id="exportBtn" disabled>.png</button>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-label" style="display:flex; align-items:center; justify-content:space-between;">
        <span>Original</span>
        <button id="centerBtn" class="secondary center-btn" disabled>Center</button>
      </div>
      <div class="panel-body" id="leftBody">
        <div class="drop-hint" id="dropHint">Drop image here<br>or paste (Ctrl+V)<br>or choose a file</div>
        <canvas id="leftCanvas"></canvas>
      </div>
    </div>
    <div class="panel">
      <div class="panel-label">Output (16x16)</div>
      <div class="paint-toolbar">
        <button id="brushBlack" type="button" class="brush-swatch brush-black" title="Black"></button>
        <button id="brushWhite" type="button" class="brush-swatch brush-white" title="White"></button>
        <span class="brush-swatch-wrap">
          <button id="brushColor" type="button" class="brush-swatch" title="Custom"></button>
          <input type="color" id="brushColorInput" value="#ff0000" title="Custom">
        </span>
        <button id="brushEraser" type="button" class="brush-swatch brush-eraser" title="Eraser"></button>
        <button id="paintUndoBtn" type="button" class="secondary center-btn" disabled>Undo</button>
        <button id="paintClearBtn" type="button" class="secondary center-btn">Clear</button>
      </div>
      <div class="panel-body">
        <div class="drop-hint" id="outHint">No image yet</div>
        <canvas id="rightCanvas" width="16" height="16"></canvas>
      </div>
    </div>
    <div class="panel">
      <div class="panel-label">Yoto preview</div>
      <div class="panel-body yoto-preview-body">
        <div class="drop-hint" id="yotoHint">No image yet</div>
        <canvas id="yotoCanvas" width="370" height="372"></canvas>
      </div>
    </div>
  </div>

  <div class="palette-strip">
    <h2>Most-used colors</h2>
    <div class="swatches" id="swatches"></div>
    <span class="toast" id="toast"></span>
  </div>

  <footer class="attribution">
    by Patrick Gawron &middot; <a href="https://github.com/pg0/yoto-icon">github.com/pg0/yoto-icon</a>
  </footer>
</main>

<script>
(function () {
  const MID_SIZE = 128;
  const FINAL_SIZE = 16;
  const MAX_WORK_SIZE = 512;
  const YOTO_PANEL = { x0: 198, x1: 335, y0: 197, y1: 335 };
  const YOTO_ICON_SIZE = 68;
  const YOTO_DRAW_X = (YOTO_PANEL.x0 + YOTO_PANEL.x1) / 2 - YOTO_ICON_SIZE / 2;
  const YOTO_DRAW_Y = (YOTO_PANEL.y0 + YOTO_PANEL.y1) / 2 - YOTO_ICON_SIZE / 2;

  const bgToggle = document.getElementById('bgToggle');
  const tolWrap = document.getElementById('tolWrap');
  const bgTolerance = document.getElementById('bgTolerance');
  const bgToleranceVal = document.getElementById('bgToleranceVal');
  const pixelToggle = document.getElementById('pixelToggle');
  const gridWrap = document.getElementById('gridWrap');
  const pixelGrid = document.getElementById('pixelGrid');
  const samplingSegmented = document.getElementById('samplingSegmented');
  const colorReduce = document.getElementById('colorReduce');
  const ditherToggle = document.getElementById('ditherToggle');
  const bgColorToggle = document.getElementById('bgColorToggle');
  const bgColorInput = document.getElementById('bgColorInput');
  const zoomSlider = document.getElementById('zoomSlider');
  const zoomVal = document.getElementById('zoomVal');
  const fileInput = document.getElementById('fileInput');
  const filenameInput = document.getElementById('filenameInput');
  const leftBody = document.getElementById('leftBody');
  const centerBtn = document.getElementById('centerBtn');
  const dropHint = document.getElementById('dropHint');
  const outHint = document.getElementById('outHint');
  const leftCanvas = document.getElementById('leftCanvas');
  const rightCanvas = document.getElementById('rightCanvas');
  const brushBlack = document.getElementById('brushBlack');
  const brushWhite = document.getElementById('brushWhite');
  const brushColor = document.getElementById('brushColor');
  const brushColorInput = document.getElementById('brushColorInput');
  const brushEraser = document.getElementById('brushEraser');
  const paintUndoBtn = document.getElementById('paintUndoBtn');
  const paintClearBtn = document.getElementById('paintClearBtn');
  const swatchesEl = document.getElementById('swatches');
  const exportBtn = document.getElementById('exportBtn');
  const toast = document.getElementById('toast');
  const yotoHint = document.getElementById('yotoHint');
  const yotoCanvas = document.getElementById('yotoCanvas');

  const leftCtx = leftCanvas.getContext('2d');
  const rightCtx = rightCanvas.getContext('2d', { willReadFrequently: true });
  const yotoCtx = yotoCanvas.getContext('2d');

  let yotoPhotoLoaded = false;
  const yotoPhoto = new Image();
  yotoPhoto.onload = () => {
    yotoPhotoLoaded = true;
    if (sourceImage) renderYotoPreview();
  };
  yotoPhoto.src = './yoto-mini-front.png';

  let sourceImage = null;
  let cropOffsetX = 0;
  let cropOffsetY = 0;
  let zoom = 1;
  let samplingMode = 'smooth'; // 'smooth' | 'nearest' | 'dominant' | 'median'
  let isDragging = false;
  let dragStartX = 0;
  let dragStartY = 0;
  let dragStartOffsetX = 0;
  let dragStartOffsetY = 0;

  // Persistent 16x16 hand-paint overlay: index = y*16+x.
  // null = untouched, {r,g,b} = painted color, 'erase' = forced transparent.
  let paintLayer = new Array(FINAL_SIZE * FINAL_SIZE).fill(null);
  let activeBrush = null; // 'black' | 'white' | 'color' | 'eraser' | null
  let isPainting = false;
  const UNDO_LIMIT = 50;
  let undoStack = []; // snapshots (256-entry array copies) of paintLayer

  // ---------- UI toggles ----------

  bgToggle.addEventListener('change', () => {
    tolWrap.style.display = bgToggle.checked ? 'inline-flex' : 'none';
    processAll();
  });
  bgTolerance.addEventListener('input', () => {
    bgToleranceVal.textContent = bgTolerance.value;
    processAll();
  });
  pixelToggle.addEventListener('change', () => {
    gridWrap.style.display = pixelToggle.checked ? 'inline-flex' : 'none';
    processAll();
  });
  pixelGrid.addEventListener('change', processAll);

  const samplingButtons = Array.from(samplingSegmented.querySelectorAll('.segment'));
  samplingButtons.forEach((btn) => {
    btn.addEventListener('click', () => {
      samplingMode = btn.dataset.mode;
      samplingButtons.forEach((b) => b.classList.toggle('active', b === btn));
      processAll();
    });
  });

  colorReduce.addEventListener('change', processAll);
  ditherToggle.addEventListener('change', processAll);

  bgColorToggle.addEventListener('change', () => {
    bgColorInput.style.display = bgColorToggle.checked ? 'inline-block' : 'none';
    processAll();
  });
  bgColorInput.addEventListener('input', processAll);

  zoomSlider.addEventListener('input', () => {
    setZoom(parseFloat(zoomSlider.value));
  });

  centerBtn.addEventListener('click', () => {
    if (!sourceImage) return;
    cropOffsetX = 0;
    cropOffsetY = 0;
    processAll();
  });

  // ---------- hand-paint ----------

  // Simple monochrome pencil glyph (white fill, black outline so it reads on
  // both light and dark cells), tip at the bottom-left, hotspot pinned to
  // the tip via the "1 15" cursor offset. No standard CSS pencil cursor
  // exists, so this is an inline SVG data-URI; 'crosshair' is the fallback.
  const PENCIL_SVG = "<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'>" +
    "<polygon points='1,15 5,11 13,3 15,5 7,13' fill='white' stroke='black' stroke-width='1' stroke-linejoin='round'/>" +
    "<polygon points='1,15 5,11 3,13' fill='black'/>" +
    "</svg>";
  const PENCIL_CURSOR = 'url("data:image/svg+xml,' + encodeURIComponent(PENCIL_SVG) + '") 1 15, crosshair';

  function applyActiveBrush() {
    for (const [btn, n] of [[brushBlack, 'black'], [brushWhite, 'white'], [brushColor, 'color'], [brushEraser, 'eraser']]) {
      btn.classList.toggle('active', activeBrush === n);
    }
    rightCanvas.style.cursor = activeBrush ? PENCIL_CURSOR : 'default';
  }

  // Toggling version for the plain swatch buttons: clicking the already-
  // active brush deselects it (no brush).
  function setActiveBrush(name) {
    activeBrush = (activeBrush === name) ? null : name;
    applyActiveBrush();
  }

  // Non-toggling version, always activates (never turns off): needed for
  // the Custom color input, whose 'click' (opening the native picker) and
  // 'input' (confirming a color) events aren't guaranteed to fire exactly
  // once per interaction - with the toggling version, a second fire could
  // immediately flip the brush back off right after activating it, which
  // is exactly the "picks a color but then doesn't paint" bug.
  function activateBrush(name) {
    activeBrush = name;
    applyActiveBrush();
  }

  brushBlack.addEventListener('click', () => setActiveBrush('black'));
  brushWhite.addEventListener('click', () => setActiveBrush('white'));
  brushEraser.addEventListener('click', () => setActiveBrush('eraser'));

  // The color input sits invisibly on top of the brushColor swatch button
  // (see .brush-swatch-wrap CSS) so interacting with it both opens the
  // native picker and activates the brush; the swatch's own click never
  // fires once the input is layered above it. Activate on 'pointerdown' -
  // it fires before the native picker even opens, so a plain click (picker
  // opened and closed with no color change, or the picker never actually
  // opening in some browsers) still activates the brush immediately with
  // whatever color is already showing. 'input' keeps it activated live
  // while the user is actively picking a new color.
  brushColor.style.background = brushColorInput.value;
  brushColorInput.addEventListener('pointerdown', () => activateBrush('color'));

  // Prefer the EyeDropper API: the native color-input dialog covers the
  // output panel, so it can't be used to pick a color off the output image
  // itself. EyeDropper lets the user sample any on-screen pixel, including
  // the output canvas. Where it's unsupported (Firefox/Safari), fall back
  // to letting the native color-input dialog open as before.
  brushColorInput.addEventListener('click', (e) => {
    activateBrush('color');
    if (!window.EyeDropper) return; // fallback: let the native dialog open
    e.preventDefault();
    new EyeDropper().open()
      .then((result) => {
        brushColorInput.value = result.sRGBHex;
        brushColor.style.background = result.sRGBHex;
        activateBrush('color');
      })
      .catch((err) => {
        // AbortError = user pressed Esc; brush stays active with the
        // previous color. Ignore silently either way.
      });
  });

  // Fallback path (no EyeDropper support): native dialog's own color
  // changes still update the swatch and keep the brush active live.
  brushColorInput.addEventListener('input', () => {
    brushColor.style.background = brushColorInput.value;
    activateBrush('color');
  });

  function pushUndoSnapshot() {
    undoStack.push(paintLayer.slice());
    if (undoStack.length > UNDO_LIMIT) undoStack.shift();
    paintUndoBtn.disabled = undoStack.length === 0;
  }

  function undoPaint() {
    if (undoStack.length === 0) return;
    paintLayer = undoStack.pop();
    paintUndoBtn.disabled = undoStack.length === 0;
    processAll();
  }

  paintUndoBtn.addEventListener('click', undoPaint);

  document.addEventListener('keydown', (e) => {
    if (!(e.ctrlKey && e.key.toLowerCase() === 'z')) return;
    const tag = document.activeElement && document.activeElement.tagName;
    const isInInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' ||
      (document.activeElement && document.activeElement.isContentEditable);
    if (isInInput) return;
    e.preventDefault();
    undoPaint();
  });

  paintClearBtn.addEventListener('click', () => {
    pushUndoSnapshot();
    paintLayer.fill(null);
    processAll();
  });

  function brushValue() {
    if (activeBrush === 'black') return { r: 0, g: 0, b: 0 };
    if (activeBrush === 'white') return { r: 255, g: 255, b: 255 };
    if (activeBrush === 'eraser') return 'erase';
    if (activeBrush === 'color') {
      const hex = brushColorInput.value;
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16)
      };
    }
    return null;
  }

  function paintAt(clientX, clientY) {
    const rect = rightCanvas.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return;
    const x = Math.floor((clientX - rect.left) / (rect.width / FINAL_SIZE));
    const y = Math.floor((clientY - rect.top) / (rect.height / FINAL_SIZE));
    if (x < 0 || y < 0 || x >= FINAL_SIZE || y >= FINAL_SIZE) return;
    const value = brushValue();
    if (value === null) return;
    paintLayer[y * FINAL_SIZE + x] = value;
    processAll();
  }

  // Pointer events (not mouse events) so touch painting works too;
  // setPointerCapture keeps the stroke tracking this element even once the
  // pointer moves outside its bounds during a fast drag.
  rightCanvas.addEventListener('pointerdown', (e) => {
    if (!sourceImage || !activeBrush) return;
    pushUndoSnapshot(); // once per stroke, before this stroke's first change
    isPainting = true;
    try { rightCanvas.setPointerCapture(e.pointerId); } catch (_) {}
    paintAt(e.clientX, e.clientY);
    e.preventDefault();
  });

  rightCanvas.addEventListener('pointermove', (e) => {
    if (!isPainting) return;
    paintAt(e.clientX, e.clientY);
  });

  function endPaint(e) {
    isPainting = false;
    if (e && rightCanvas.hasPointerCapture(e.pointerId)) {
      rightCanvas.releasePointerCapture(e.pointerId);
    }
  }
  rightCanvas.addEventListener('pointerup', endPaint);
  rightCanvas.addEventListener('pointercancel', endPaint);

  // ---------- image loading ----------

  fileInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]);
  });

  leftBody.addEventListener('dragover', (e) => {
    e.preventDefault();
  });
  leftBody.addEventListener('drop', (e) => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (files && files[0]) loadFile(files[0]);
  });

  leftBody.addEventListener('wheel', (e) => {
    if (!sourceImage) return;
    e.preventDefault();
    setZoom(zoom + (e.deltaY > 0 ? -0.1 : 0.1));
  }, { passive: false });

  window.addEventListener('paste', (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
      if (item.type && item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) loadFile(file, 'yoto-icon');
        break;
      }
    }
  });

  function loadFile(file, forcedName) {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      cropOffsetX = 0;
      cropOffsetY = 0;
      zoom = 1;
      zoomSlider.value = '1';
      zoomVal.textContent = '1.0';
      paintLayer.fill(null);
      undoStack = [];
      paintUndoBtn.disabled = true;

      let base = forcedName;
      if (!base) {
        base = (file.name || '').replace(/\.[^/.]+$/, '').trim();
        if (!base) base = 'yoto-icon';
      }
      filenameInput.value = base;

      URL.revokeObjectURL(url);
      dropHint.style.display = 'none';
      outHint.style.display = 'none';
      leftCanvas.style.display = 'block';
      rightCanvas.style.display = 'block';
      leftCanvas.style.cursor = 'grab';
      yotoHint.style.display = 'none';
      yotoCanvas.style.display = 'block';
      exportBtn.disabled = false;
      centerBtn.disabled = false;
      processAll();
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      alert('Could not load that file as an image.');
    };
    img.src = url;
  }

  // ---------- pipeline ----------

  function getCropSlack(img, z) {
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    const size = Math.min(iw, ih);
    const cropSize = size / z;
    return { iw, ih, size, cropSize, baseSx: (iw - cropSize) / 2, baseSy: (ih - cropSize) / 2 };
  }

  function centerCropSquare(img) {
    const { iw, ih, cropSize, baseSx, baseSy } = getCropSlack(img, zoom);
    // Round the crop rect to integer source pixels so it is pixel-exact:
    // fractional sx/sy/cropSize force the browser to bilinear-blend the
    // sampled corner pixels even at 1:1 scale, which drifts the flood-fill
    // seed color away from the true background color.
    const cs = Math.max(1, Math.round(cropSize));
    const sx = Math.round(baseSx - cropOffsetX);
    const sy = Math.round(baseSy - cropOffsetY);
    const workSize = Math.round(Math.min(cs, MAX_WORK_SIZE));
    const c = document.createElement('canvas');
    c.width = workSize;
    c.height = workSize;
    const ctx = c.getContext('2d');

    // The crop rect [sx, sx+cs) x [sy, sy+cs) can now extend outside the
    // image bounds (panning lets the user push the crop window fully off
    // an edge). Draw only the part that actually overlaps the image, at
    // the proportionally corresponding spot in the destination canvas, so
    // nothing gets stretched - area with no source coverage is left as-is,
    // which is transparent since a freshly created canvas starts fully
    // transparent.
    const ix0 = Math.max(0, sx);
    const iy0 = Math.max(0, sy);
    const ix1 = Math.min(iw, sx + cs);
    const iy1 = Math.min(ih, sy + cs);
    const overlapW = ix1 - ix0;
    const overlapH = iy1 - iy0;

    if (overlapW > 0 && overlapH > 0) {
      const scale = workSize / cs;
      const dx = (ix0 - sx) * scale;
      const dy = (iy0 - sy) * scale;
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(img, ix0, iy0, overlapW, overlapH, dx, dy, overlapW * scale, overlapH * scale);
    }
    return c;
  }

  function clampCropOffset() {
    if (!sourceImage) return;
    const { baseSx, baseSy, cropSize } = getCropSlack(sourceImage, zoom);
    // baseSx/baseSy go negative once zoom < 1 makes the crop window bigger
    // than the image itself - abs() keeps the clamp symmetric either way.
    const limX = Math.abs(baseSx) + cropSize;
    const limY = Math.abs(baseSy) + cropSize;
    cropOffsetX = Math.max(-limX, Math.min(limX, cropOffsetX));
    cropOffsetY = Math.max(-limY, Math.min(limY, cropOffsetY));
  }

  // Zoom slider is min 0.25 step 0.05 (0.25 + k*0.05 lands exactly on 1.00).
  // Snap to that grid ourselves too so repeated wheel taps can't drift off
  // it via floating point error.
  function formatZoom(z) {
    const s2 = z.toFixed(2);
    return s2.endsWith('0') ? z.toFixed(1) : s2; // "1.00" -> "1.0", "1.35" stays
  }

  function setZoom(z) {
    const ZOOM_STEP = 0.05;
    let snapped = Math.round(z / ZOOM_STEP) * ZOOM_STEP;
    snapped = Math.round(snapped * 100) / 100; // kill residual float noise
    zoom = Math.max(0.25, Math.min(5, snapped));
    zoomSlider.value = zoom.toFixed(2);
    zoomVal.textContent = formatZoom(zoom);
    if (sourceImage) {
      clampCropOffset();
      processAll();
    }
  }

  // ---------- drag to align crop ----------
  // Pointer events (not mouse events) so touch dragging works too;
  // setPointerCapture keeps the drag tracking this element even once the
  // pointer moves outside its bounds, so listeners can live on the canvas
  // itself instead of document.

  leftCanvas.addEventListener('pointerdown', (e) => {
    if (!sourceImage) return;
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragStartOffsetX = cropOffsetX;
    dragStartOffsetY = cropOffsetY;
    leftCanvas.style.cursor = 'grabbing';
    try { leftCanvas.setPointerCapture(e.pointerId); } catch (_) {}
    e.preventDefault();
  });

  leftCanvas.addEventListener('pointermove', (e) => {
    if (!isDragging || !sourceImage) return;
    const rect = leftCanvas.getBoundingClientRect();
    const { cropSize, baseSx, baseSy } = getCropSlack(sourceImage, zoom);
    const scaleX = rect.width > 0 ? cropSize / rect.width : 1;
    const scaleY = rect.height > 0 ? cropSize / rect.height : 1;
    const deltaPxX = e.clientX - dragStartX;
    const deltaPxY = e.clientY - dragStartY;
    const limX = Math.abs(baseSx) + cropSize;
    const limY = Math.abs(baseSy) + cropSize;

    let newOffsetX = dragStartOffsetX + deltaPxX * scaleX;
    let newOffsetY = dragStartOffsetY + deltaPxY * scaleY;
    newOffsetX = Math.max(-limX, Math.min(limX, newOffsetX));
    newOffsetY = Math.max(-limY, Math.min(limY, newOffsetY));

    cropOffsetX = newOffsetX;
    cropOffsetY = newOffsetY;
    processAll();
  });

  function endDrag(e) {
    if (isDragging) {
      isDragging = false;
      if (sourceImage) leftCanvas.style.cursor = 'grab';
    }
    if (e && leftCanvas.hasPointerCapture(e.pointerId)) {
      leftCanvas.releasePointerCapture(e.pointerId);
    }
  }
  leftCanvas.addEventListener('pointerup', endDrag);
  leftCanvas.addEventListener('pointercancel', endDrag);

  function colorDistance(r1, g1, b1, r2, g2, b2) {
    const dr = r1 - r2, dg = g1 - g2, db = b1 - b2;
    return Math.sqrt(dr * dr + dg * dg + db * db);
  }

  function sampleSeedColor(data, width, height, cx, cy) {
    // Average a small patch around the corner instead of trusting a single
    // pixel - a lone anti-aliased/noisy/compression-artifact pixel right at
    // the corner can otherwise seed the fill with an off color and make the
    // whole flood fill fail to match anything. Fully transparent pixels
    // (e.g. crop area panned outside the source image) are excluded so
    // their zeroed-out RGB never pulls the seed toward black.
    const RADIUS = 1;
    let rSum = 0, gSum = 0, bSum = 0, count = 0;
    for (let dy = -RADIUS; dy <= RADIUS; dy++) {
      for (let dx = -RADIUS; dx <= RADIUS; dx++) {
        const x = cx + dx, y = cy + dy;
        if (x < 0 || y < 0 || x >= width || y >= height) continue;
        const idx = (y * width + x) * 4;
        if (data[idx + 3] === 0) continue;
        rSum += data[idx]; gSum += data[idx + 1]; bSum += data[idx + 2];
        count++;
      }
    }
    if (count === 0) return null;
    return { r: rSum / count, g: gSum / count, b: bSum / count };
  }

  function removeBackground(imageData, tolerancePct) {
    const { width, height, data } = imageData;
    const threshold = (tolerancePct / 100) * 441.7;
    const visited = new Uint8Array(width * height);
    const corners = [
      [0, 0], [width - 1, 0], [0, height - 1], [width - 1, height - 1]
    ];

    for (const [cx, cy] of corners) {
      const startIdx = cy * width + cx;
      if (visited[startIdx]) continue;
      // A corner that's already fully transparent (crop panned outside the
      // source image) has no real color to seed with - skip it, it's
      // already transparent so there's nothing to remove there anyway.
      if (data[startIdx * 4 + 3] === 0) continue;
      const seed = sampleSeedColor(data, width, height, cx, cy);
      if (!seed) continue;
      const sr = seed.r, sg = seed.g, sb = seed.b;

      const stack = [[cx, cy]];
      visited[startIdx] = 1;

      while (stack.length) {
        const [x, y] = stack.pop();
        const pi = (y * width + x) * 4;
        data[pi + 3] = 0;

        const neighbors = [[x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]];
        for (const [nx, ny] of neighbors) {
          if (nx < 0 || ny < 0 || nx >= width || ny >= height) continue;
          const nidx = ny * width + nx;
          if (visited[nidx]) continue;
          const npi = nidx * 4;
          if (data[npi + 3] === 0) {
            // Already transparent - nothing to remove, don't let its
            // zeroed RGB feed into the flood match.
            visited[nidx] = 1;
            continue;
          }
          const dist = colorDistance(data[npi], data[npi + 1], data[npi + 2], sr, sg, sb);
          if (dist <= threshold) {
            visited[nidx] = 1;
            stack.push([nx, ny]);
          }
        }
      }
    }
    return imageData;
  }

  function getRanges(box) {
    let rMin = 255, rMax = 0, gMin = 255, gMax = 0, bMin = 255, bMax = 0;
    for (const p of box) {
      if (p.r < rMin) rMin = p.r;
      if (p.r > rMax) rMax = p.r;
      if (p.g < gMin) gMin = p.g;
      if (p.g > gMax) gMax = p.g;
      if (p.b < bMin) bMin = p.b;
      if (p.b > bMax) bMax = p.b;
    }
    return { r: rMax - rMin, g: gMax - gMin, b: bMax - bMin };
  }

  function averageColor(box) {
    let r = 0, g = 0, b = 0;
    for (const p of box) { r += p.r; g += p.g; b += p.b; }
    const n = box.length;
    return { r: Math.round(r / n), g: Math.round(g / n), b: Math.round(b / n) };
  }

  function medianCutQuantize(pixels, numColors) {
    let boxes = [pixels];
    while (boxes.length < numColors) {
      let boxIndex = -1, maxRange = -1, channel = 'r';
      for (let i = 0; i < boxes.length; i++) {
        const box = boxes[i];
        if (box.length < 2) continue;
        const ranges = getRanges(box);
        const m = Math.max(ranges.r, ranges.g, ranges.b);
        if (m > maxRange) {
          maxRange = m;
          boxIndex = i;
          channel = ranges.r === m ? 'r' : (ranges.g === m ? 'g' : 'b');
        }
      }
      if (boxIndex === -1) break;
      const box = boxes[boxIndex];
      box.sort((a, b) => a[channel] - b[channel]);
      const mid = Math.floor(box.length / 2);
      const box1 = box.slice(0, mid);
      const box2 = box.slice(mid);
      boxes.splice(boxIndex, 1, box1, box2);
    }
    return boxes.filter(b => b.length > 0).map(averageColor);
  }

  function nearestPaletteColor(r, g, b, palette) {
    let best = palette[0], bestDist = Infinity;
    for (const c of palette) {
      const dr = r - c.r, dg = g - c.g, db = b - c.b;
      const dist = dr * dr + dg * dg + db * db;
      if (dist < bestDist) { bestDist = dist; best = c; }
    }
    return best;
  }

  function applyColorReduction(imageData, numColors) {
    const { data } = imageData;
    const pixels = [];
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] > 0) pixels.push({ r: data[i], g: data[i + 1], b: data[i + 2] });
    }
    if (pixels.length === 0) return imageData;
    const palette = medianCutQuantize(pixels, numColors);
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] > 0) {
        const c = nearestPaletteColor(data[i], data[i + 1], data[i + 2], palette);
        data[i] = c.r; data[i + 1] = c.g; data[i + 2] = c.b;
      }
    }
    return imageData;
  }

  function medianOf(arr) {
    const s = arr.slice().sort((a, b) => a - b);
    return s[Math.floor(s.length / 2)];
  }

  // Downscales srcImageData to targetSize x targetSize by picking, per
  // output cell, either the dominant (most-frequent, near-duplicates
  // bucketed) color or the per-channel median color among that cell's
  // opaque source pixels. A cell with >50% transparent source pixels comes
  // out transparent; fully transparent pixels never vote either way.
  function cellSample(srcImageData, targetSize, mode) {
    const sw = srcImageData.width, sh = srcImageData.height, sd = srcImageData.data;
    const out = new ImageData(targetSize, targetSize);
    const od = out.data;

    for (let ty = 0; ty < targetSize; ty++) {
      const y0 = Math.floor(ty * sh / targetSize);
      const y1 = Math.max(y0 + 1, Math.floor((ty + 1) * sh / targetSize));
      for (let tx = 0; tx < targetSize; tx++) {
        const x0 = Math.floor(tx * sw / targetSize);
        const x1 = Math.max(x0 + 1, Math.floor((tx + 1) * sw / targetSize));

        let total = 0, transparentCount = 0;
        const rs = [], gs = [], bs = [];
        for (let y = y0; y < y1; y++) {
          for (let x = x0; x < x1; x++) {
            const idx = (y * sw + x) * 4;
            total++;
            if (sd[idx + 3] === 0) { transparentCount++; continue; }
            rs.push(sd[idx]); gs.push(sd[idx + 1]); bs.push(sd[idx + 2]);
          }
        }

        if (total === 0 || transparentCount / total > 0.5) continue; // stays transparent (ImageData starts zeroed)

        let r, g, b;
        if (mode === 'median') {
          r = medianOf(rs); g = medianOf(gs); b = medianOf(bs);
        } else {
          // dominant: bucket by quantizing each channel to 16 levels so
          // near-duplicate colors count as one vote, then average the
          // actual pixels that fell in the winning bucket
          const buckets = new Map();
          for (let i = 0; i < rs.length; i++) {
            const key = (rs[i] >> 4) + ',' + (gs[i] >> 4) + ',' + (bs[i] >> 4);
            let e = buckets.get(key);
            if (!e) { e = { count: 0, rSum: 0, gSum: 0, bSum: 0 }; buckets.set(key, e); }
            e.count++; e.rSum += rs[i]; e.gSum += gs[i]; e.bSum += bs[i];
          }
          let best = null;
          for (const e of buckets.values()) { if (!best || e.count > best.count) best = e; }
          r = Math.round(best.rSum / best.count);
          g = Math.round(best.gSum / best.count);
          b = Math.round(best.bSum / best.count);
        }

        const oi = (ty * targetSize + tx) * 4;
        od[oi] = r; od[oi + 1] = g; od[oi + 2] = b; od[oi + 3] = 255;
      }
    }
    return out;
  }

  // Floyd-Steinberg dithered version of applyColorReduction: same
  // median-cut palette, but quantization error is diffused to neighboring
  // pixels instead of just nearest-mapping each pixel in isolation.
  // Transparent pixels neither dither themselves nor receive diffused error.
  function applyColorReductionDither(imageData, numColors) {
    const { data, width, height } = imageData;
    const pixels = [];
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] > 0) pixels.push({ r: data[i], g: data[i + 1], b: data[i + 2] });
    }
    if (pixels.length === 0) return imageData;
    const palette = medianCutQuantize(pixels, numColors);

    const n = width * height;
    const rBuf = new Float32Array(n), gBuf = new Float32Array(n), bBuf = new Float32Array(n);
    for (let p = 0; p < n; p++) {
      const i = p * 4;
      rBuf[p] = data[i]; gBuf[p] = data[i + 1]; bBuf[p] = data[i + 2];
    }

    function isOpaque(x, y) {
      if (x < 0 || y < 0 || x >= width || y >= height) return false;
      return data[(y * width + x) * 4 + 3] > 0;
    }
    function addErr(x, y, er, eg, eb) {
      if (!isOpaque(x, y)) return;
      const p = y * width + x;
      rBuf[p] += er; gBuf[p] += eg; bBuf[p] += eb;
    }

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const i = (y * width + x) * 4;
        if (data[i + 3] === 0) continue;
        const p = y * width + x;
        const oldR = rBuf[p], oldG = gBuf[p], oldB = bBuf[p];
        const c = nearestPaletteColor(
          Math.max(0, Math.min(255, oldR)),
          Math.max(0, Math.min(255, oldG)),
          Math.max(0, Math.min(255, oldB)),
          palette
        );
        data[i] = c.r; data[i + 1] = c.g; data[i + 2] = c.b;
        const errR = oldR - c.r, errG = oldG - c.g, errB = oldB - c.b;
        addErr(x + 1, y, errR * 7 / 16, errG * 7 / 16, errB * 7 / 16);
        addErr(x - 1, y + 1, errR * 3 / 16, errG * 3 / 16, errB * 3 / 16);
        addErr(x, y + 1, errR * 5 / 16, errG * 5 / 16, errB * 5 / 16);
        addErr(x + 1, y + 1, errR * 1 / 16, errG * 1 / 16, errB * 1 / 16);
      }
    }
    return imageData;
  }

  function processAll() {
    if (!sourceImage) return;

    // 1. square crop
    const squareCanvas = centerCropSquare(sourceImage);
    const S = squareCanvas.width;

    // 2. background removal (left panel reflects this too)
    let leftResult = squareCanvas;
    if (bgToggle.checked) {
      const ctx = squareCanvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, S, S);
      removeBackground(imgData, parseInt(bgTolerance.value, 10));
      ctx.putImageData(imgData, 0, 0);
      leftResult = squareCanvas;
    }

    leftCanvas.width = S;
    leftCanvas.height = S;
    leftCtx.clearRect(0, 0, S, S);
    leftCtx.drawImage(leftResult, 0, 0);
    // Tiny pixel-art sources otherwise look blurry: the browser bilinear-
    // upscales a small backing canvas to fill the larger CSS display box.
    // Switch to nearest-neighbor display only when actually upscaling;
    // normal photos (backing >= displayed size) keep smooth scaling.
    leftCanvas.style.imageRendering = (leftCanvas.width < leftCanvas.clientWidth) ? 'pixelated' : '';

    // 3. downscale to the grid (pixelate on) or straight to the true size
    // (pixelate off), honoring the sampling mode, then relay into the
    // 128px internal intermediate canvas.
    const midCanvas = document.createElement('canvas');
    midCanvas.width = MID_SIZE;
    midCanvas.height = MID_SIZE;
    const midCtx = midCanvas.getContext('2d', { willReadFrequently: true });

    const isPixelated = pixelToggle.checked;
    const cellMode = samplingMode === 'dominant' || samplingMode === 'median';

    if (isPixelated) {
      const N = parseInt(pixelGrid.value, 10);
      const gridCanvas = document.createElement('canvas');
      gridCanvas.width = N;
      gridCanvas.height = N;
      if (cellMode) {
        const srcData = leftResult.getContext('2d').getImageData(0, 0, S, S);
        gridCanvas.getContext('2d').putImageData(cellSample(srcData, N, samplingMode), 0, 0);
      } else {
        const gridCtx = gridCanvas.getContext('2d');
        gridCtx.imageSmoothingEnabled = samplingMode === 'smooth';
        gridCtx.drawImage(leftResult, 0, 0, S, S, 0, 0, N, N);
      }
      // relay the grid up to the 128 intermediate - always a faithful
      // nearest upscale, never a second resampling pass
      midCtx.imageSmoothingEnabled = false;
      midCtx.drawImage(gridCanvas, 0, 0, N, N, 0, 0, MID_SIZE, MID_SIZE);
    } else if (cellMode) {
      // Sample straight to the true 16x16 grid - this IS the final pixel
      // grid. Relay it up to the 128 canvas (nearest, exact 8x factor)
      // purely so color reduction has its usual canvas to work on; no
      // second statistical resampling happens.
      const srcData = leftResult.getContext('2d').getImageData(0, 0, S, S);
      const sampledCanvas = document.createElement('canvas');
      sampledCanvas.width = FINAL_SIZE;
      sampledCanvas.height = FINAL_SIZE;
      sampledCanvas.getContext('2d').putImageData(cellSample(srcData, FINAL_SIZE, samplingMode), 0, 0);
      midCtx.imageSmoothingEnabled = false;
      midCtx.drawImage(sampledCanvas, 0, 0, FINAL_SIZE, FINAL_SIZE, 0, 0, MID_SIZE, MID_SIZE);
    } else {
      midCtx.imageSmoothingEnabled = samplingMode === 'smooth';
      midCtx.drawImage(leftResult, 0, 0, S, S, 0, 0, MID_SIZE, MID_SIZE);
    }

    // 4. color reduction (still applied on the 128 intermediate)
    const reduceVal = colorReduce.value;
    if (reduceVal !== 'off') {
      const imgData = midCtx.getImageData(0, 0, MID_SIZE, MID_SIZE);
      if (ditherToggle.checked) {
        applyColorReductionDither(imgData, parseInt(reduceVal, 10));
      } else {
        applyColorReduction(imgData, parseInt(reduceVal, 10));
      }
      midCtx.putImageData(imgData, 0, 0);
    }

    // 4b. optional background color - flatten the 128 intermediate onto a
    // solid color now (destination-over: fill shows only through the
    // still-transparent pixels) so the final downscale below blends clean
    // opaque edges against that color instead of against transparency.
    if (bgColorToggle.checked) {
      midCtx.save();
      midCtx.globalCompositeOperation = 'destination-over';
      midCtx.fillStyle = bgColorInput.value;
      midCtx.fillRect(0, 0, MID_SIZE, MID_SIZE);
      midCtx.restore();
    }

    // 5. true output stage - downscale the 128 intermediate to the real
    // 16x16 icon. Nearest whenever the grid is meant to stay crisp
    // (pixelate on, or any non-smooth sampling mode) so exact
    // sampled/quantized colors survive instead of blurring back together.
    rightCtx.clearRect(0, 0, FINAL_SIZE, FINAL_SIZE);
    rightCtx.imageSmoothingEnabled = !(isPixelated || samplingMode !== 'smooth');
    rightCtx.drawImage(midCanvas, 0, 0, MID_SIZE, MID_SIZE, 0, 0, FINAL_SIZE, FINAL_SIZE);

    // 6. hand-paint overlay - applied BEFORE the background color, not
    // after: erase punches a real transparent hole here, and the
    // background color (next, if on) sits underneath it like any other
    // transparency. With BG color off, that hole is the final result.
    applyPaintLayer();

    // 7. optional background color - the actual last stage, on both this
    // 16x16 canvas and the 128 intermediate above (step 4b). Composited via
    // destination-over so it only shows through transparency - original
    // cutout areas AND erased paint cells alike - never overwriting opaque
    // pixels.
    if (bgColorToggle.checked) {
      rightCtx.save();
      rightCtx.globalCompositeOperation = 'destination-over';
      rightCtx.fillStyle = bgColorInput.value;
      rightCtx.fillRect(0, 0, FINAL_SIZE, FINAL_SIZE);
      rightCtx.restore();
    }

    updateSwatches();
    renderYotoPreview();
  }

  function applyPaintLayer() {
    if (paintLayer.every((v) => v === null)) return;
    const imgData = rightCtx.getImageData(0, 0, FINAL_SIZE, FINAL_SIZE);
    const data = imgData.data;
    for (let idx = 0; idx < paintLayer.length; idx++) {
      const v = paintLayer[idx];
      if (v === null) continue;
      const pi = idx * 4;
      if (v === 'erase') {
        data[pi] = 0; data[pi + 1] = 0; data[pi + 2] = 0; data[pi + 3] = 0;
      } else {
        data[pi] = v.r; data[pi + 1] = v.g; data[pi + 2] = v.b; data[pi + 3] = 255;
      }
    }
    rightCtx.putImageData(imgData, 0, 0);
  }

  // ---------- palette / swatches ----------

  function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
  }

  function updateSwatches() {
    const imgData = rightCtx.getImageData(0, 0, FINAL_SIZE, FINAL_SIZE);
    const data = imgData.data;
    const counts = new Map();
    let opaqueTotal = 0;

    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] === 0) continue;
      opaqueTotal++;
      const key = data[i] + ',' + data[i + 1] + ',' + data[i + 2];
      counts.set(key, (counts.get(key) || 0) + 1);
    }

    const sorted = Array.from(counts.entries()).sort((a, b) => b[1] - a[1]).slice(0, 8);

    swatchesEl.innerHTML = '';
    for (const [key, count] of sorted) {
      const [r, g, b] = key.split(',').map(Number);
      const hex = rgbToHex(r, g, b);
      const pct = opaqueTotal > 0 ? ((count / opaqueTotal) * 100).toFixed(1) : '0.0';

      const el = document.createElement('div');
      el.className = 'swatch';
      el.innerHTML =
        '<span class="chip" style="background:' + hex + '"></span>' +
        '<span class="hex">' + hex + '</span>' +
        '<span class="pct">' + pct + '%</span>';
      el.addEventListener('click', () => {
        navigator.clipboard.writeText(hex).then(() => showToast('Copied ' + hex));
        brushColorInput.value = hex;
        brushColor.style.background = hex;
        activateBrush('color');
      });
      swatchesEl.appendChild(el);
    }
  }

  // ---------- yoto box preview ----------

  function renderYotoPreview() {
    if (!yotoPhotoLoaded || !sourceImage) return;
    yotoCtx.clearRect(0, 0, yotoCanvas.width, yotoCanvas.height);
    yotoCtx.drawImage(yotoPhoto, 0, 0);
    yotoCtx.imageSmoothingEnabled = false;
    yotoCtx.drawImage(
      rightCanvas, 0, 0, FINAL_SIZE, FINAL_SIZE,
      YOTO_DRAW_X, YOTO_DRAW_Y, YOTO_ICON_SIZE, YOTO_ICON_SIZE
    );
  }

  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1400);
  }

  // ---------- export ----------

  function sanitizeFilename(name) {
    let n = (name || '').trim();
    n = n.replace(/[\\/:*?"<>|]/g, '');
    n = n.trim();
    if (!n) n = 'yoto-icon';
    return n;
  }

  exportBtn.addEventListener('click', () => {
    rightCanvas.toBlob((blob) => {
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = sanitizeFilename(filenameInput.value) + '.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 'image/png');
  });
})();
</script>

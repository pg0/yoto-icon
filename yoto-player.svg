<svg xmlns="http://www.w3.org/2000/svg" width="370" height="372" viewBox="0 0 370 372">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f7f7f4"/>
      <stop offset="1" stop-color="#e8e8e4"/>
    </linearGradient>
    <linearGradient id="sheenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.09"/>
    </linearGradient>
    <linearGradient id="sideGradL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sideGradR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b2b1a9"/>
      <stop offset="0.5" stop-color="#c8c7bf"/>
      <stop offset="1" stop-color="#dedcd3"/>
    </linearGradient>
    <linearGradient id="knobGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f29066"/>
      <stop offset="0.5" stop-color="#e8734a"/>
      <stop offset="1" stop-color="#d05c35"/>
    </linearGradient>
    <filter id="blurBig" x="-40%" y="-200%" width="180%" height="500%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blurSmall" x="-60%" y="-200%" width="220%" height="500%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <clipPath id="bodyClip">
      <rect x="16" y="30" width="338" height="328" rx="68" ry="68"/>
    </clipPath>
  </defs>

  <!-- floor shadow -->
  <ellipse cx="185" cy="363" rx="150" ry="11" fill="#2b2b28" opacity="0.26" filter="url(#blurBig)"/>
  <ellipse cx="185" cy="361" rx="112" ry="7" fill="#2b2b28" opacity="0.18" filter="url(#blurSmall)"/>

  <!-- knobs (behind body), short button pucks -->
  <g transform="rotate(-9 78 34)">
    <rect x="57" y="8" width="42" height="34" rx="15" ry="15" fill="url(#knobGrad)"/>
    <ellipse cx="78" cy="14" rx="15" ry="5" fill="#f6a884" opacity="0.85"/>
    <rect x="62" y="12" width="4.5" height="16" rx="2.25" fill="#ffffff" opacity="0.35"/>
  </g>
  <g transform="rotate(9 292 34)">
    <rect x="271" y="8" width="42" height="34" rx="15" ry="15" fill="url(#knobGrad)"/>
    <ellipse cx="292" cy="14" rx="15" ry="5" fill="#f6a884" opacity="0.85"/>
    <rect x="276" y="12" width="4.5" height="16" rx="2.25" fill="#ffffff" opacity="0.35"/>
  </g>

  <!-- body -->
  <rect x="16" y="30" width="338" height="328" rx="68" ry="68" fill="url(#bodyGrad)" stroke="#d5d4cf" stroke-width="1.5"/>

  <!-- body shading, clipped to silhouette, kept outside the screen interior -->
  <g clip-path="url(#bodyClip)">
    <rect x="40" y="36" width="290" height="46" rx="22" fill="url(#sheenGrad)" opacity="0.8"/>
    <rect x="16" y="330" width="338" height="28" fill="url(#aoGrad)"/>
    <rect x="16" y="60" width="38" height="270" fill="url(#sideGradL)"/>
    <rect x="316" y="60" width="38" height="270" fill="url(#sideGradR)"/>
    <ellipse cx="78" cy="40" rx="24" ry="6" fill="#000000" opacity="0.14" filter="url(#blurSmall)" transform="rotate(-18 78 40)"/>
    <ellipse cx="292" cy="40" rx="24" ry="6" fill="#000000" opacity="0.14" filter="url(#blurSmall)" transform="rotate(18 292 40)"/>
  </g>
  <!-- top rim light -->
  <g clip-path="url(#bodyClip)">
    <rect x="19" y="33" width="332" height="322" rx="65" ry="65" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.55"/>
  </g>

  <!-- subtle card slot slit on the top edge (no card inserted) -->
  <rect x="149" y="25" width="72" height="7" rx="3.5" fill="#45443f" opacity="0.85"/>
  <rect x="151" y="32.5" width="68" height="1.6" rx="0.8" fill="#ffffff" opacity="0.5"/>

  <!-- recessed bezel around the screen -->
  <rect x="35" y="44" width="300" height="300" rx="34" ry="34" fill="url(#bezelGrad)" stroke="#c7c6bf" stroke-width="1"/>
  <rect x="43" y="52" width="284" height="284" rx="27" ry="27" fill="none" stroke="#a5a49b" stroke-width="2"/>

  <!-- LED screen: exact bounds, flat fill, nothing inside -->
  <rect x="44" y="53" width="282" height="282" rx="26" ry="26" fill="#cfcfc6"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="370" height="372" viewBox="0 0 370 372">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f7f7f4"/>
      <stop offset="1" stop-color="#e8e8e4"/>
    </linearGradient>
    <linearGradient id="sheenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.09"/>
    </linearGradient>
    <linearGradient id="sideGradL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sideGradR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b2b1a9"/>
      <stop offset="0.5" stop-color="#c8c7bf"/>
      <stop offset="1" stop-color="#dedcd3"/>
    </linearGradient>
    <linearGradient id="knobGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f29066"/>
      <stop offset="0.5" stop-color="#e8734a"/>
      <stop offset="1" stop-color="#d05c35"/>
    </linearGradient>
    <filter id="blurBig" x="-40%" y="-200%" width="180%" height="500%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blurSmall" x="-60%" y="-200%" width="220%" height="500%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <clipPath id="bodyClip">
      <rect x="48" y="82" width="274" height="274" rx="54" ry="54"/>
    </clipPath>
  </defs>

  <!-- floor shadow -->
  <ellipse cx="185" cy="360" rx="140" ry="12" fill="#2b2b28" opacity="0.26" filter="url(#blurBig)"/>
  <ellipse cx="185" cy="358" rx="104" ry="7" fill="#2b2b28" opacity="0.18" filter="url(#blurSmall)"/>

  <!-- knobs (behind body) -->
  <g transform="rotate(-9 80 82)">
    <rect x="60" y="58" width="40" height="42" rx="15" ry="15" fill="url(#knobGrad)"/>
    <ellipse cx="80" cy="64" rx="14" ry="5" fill="#f6a884" opacity="0.85"/>
    <rect x="65" y="62" width="4.5" height="20" rx="2.25" fill="#ffffff" opacity="0.35"/>
  </g>
  <g transform="rotate(9 290 82)">
    <rect x="270" y="58" width="40" height="42" rx="15" ry="15" fill="url(#knobGrad)"/>
    <ellipse cx="290" cy="64" rx="14" ry="5" fill="#f6a884" opacity="0.85"/>
    <rect x="275" y="62" width="4.5" height="20" rx="2.25" fill="#ffffff" opacity="0.35"/>
  </g>

  <!-- body -->
  <rect x="48" y="82" width="274" height="274" rx="54" ry="54" fill="url(#bodyGrad)" stroke="#d5d4cf" stroke-width="1.5"/>

  <!-- body shading, clipped to silhouette, kept outside the screen interior -->
  <g clip-path="url(#bodyClip)">
    <rect x="66" y="88" width="238" height="40" rx="20" fill="url(#sheenGrad)" opacity="0.8"/>
    <rect x="48" y="326" width="274" height="30" fill="url(#aoGrad)"/>
    <rect x="48" y="106" width="32" height="230" fill="url(#sideGradL)"/>
    <rect x="290" y="106" width="32" height="230" fill="url(#sideGradR)"/>
    <ellipse cx="80" cy="90" rx="22" ry="6" fill="#000000" opacity="0.14" filter="url(#blurSmall)" transform="rotate(-18 80 90)"/>
    <ellipse cx="290" cy="90" rx="22" ry="6" fill="#000000" opacity="0.14" filter="url(#blurSmall)" transform="rotate(18 290 90)"/>
  </g>
  <!-- top rim light -->
  <g clip-path="url(#bodyClip)">
    <rect x="51" y="85" width="268" height="268" rx="51" ry="51" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.55"/>
  </g>

  <!-- subtle card slot slit on the top edge (no card inserted) -->
  <rect x="150" y="79" width="70" height="7" rx="3.5" fill="#45443f" opacity="0.85"/>
  <rect x="152" y="86.5" width="66" height="1.6" rx="0.8" fill="#ffffff" opacity="0.5"/>

  <!-- recessed bezel around the screen -->
  <rect x="60" y="94" width="250" height="250" rx="30" ry="30" fill="url(#bezelGrad)" stroke="#c7c6bf" stroke-width="1"/>
  <rect x="69" y="103" width="232" height="232" rx="23" ry="23" fill="none" stroke="#a5a49b" stroke-width="2"/>

  <!-- LED screen: exact bounds, flat fill, nothing inside -->
  <rect x="70" y="104" width="230" height="230" rx="22" ry="22" fill="#cfcfc6"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="370" height="372" viewBox="0 0 370 372">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f7f7f4"/>
      <stop offset="1" stop-color="#e8e8e4"/>
    </linearGradient>
    <linearGradient id="sheenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.09"/>
    </linearGradient>
    <linearGradient id="sideGradL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sideGradR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b2b1a9"/>
      <stop offset="0.5" stop-color="#c8c7bf"/>
      <stop offset="1" stop-color="#dedcd3"/>
    </linearGradient>
    <linearGradient id="knobGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f29066"/>
      <stop offset="0.5" stop-color="#e8734a"/>
      <stop offset="1" stop-color="#d05c35"/>
    </linearGradient>
    <linearGradient id="cardShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="blurBig" x="-40%" y="-200%" width="180%" height="500%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blurSmall" x="-60%" y="-200%" width="220%" height="500%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <clipPath id="bodyClip">
      <rect x="45" y="84" width="280" height="264" rx="62" ry="62"/>
    </clipPath>
    <clipPath id="cardClip">
      <rect x="137" y="10" width="96" height="80" rx="9" ry="9"/>
    </clipPath>
  </defs>

  <!-- floor shadow -->
  <ellipse cx="185" cy="351" rx="142" ry="13" fill="#2b2b28" opacity="0.26" filter="url(#blurBig)"/>
  <ellipse cx="185" cy="349" rx="108" ry="8" fill="#2b2b28" opacity="0.18" filter="url(#blurSmall)"/>

  <!-- card in slot (behind body) -->
  <g>
    <g clip-path="url(#cardClip)">
      <rect x="137" y="10" width="96" height="80" fill="#f7f2e6"/>
      <rect x="137" y="10" width="96" height="28" fill="#4aa39c"/>
      <circle cx="185" cy="24" r="8" fill="#f6d06b"/>
      <rect x="137" y="62" width="96" height="9" fill="#e8734a"/>
      <rect x="137" y="58" width="96" height="32" fill="url(#cardShade)"/>
      <rect x="137" y="10" width="10" height="80" fill="#ffffff" opacity="0.25"/>
    </g>
    <rect x="137.75" y="10.75" width="94.5" height="78.5" rx="8.5" ry="8.5" fill="none" stroke="#d9d2c0" stroke-width="1.5"/>
  </g>

  <!-- knobs (behind body) -->
  <g transform="rotate(-9 79 108)">
    <rect x="57" y="44" width="44" height="64" rx="15" ry="15" fill="url(#knobGrad)"/>
    <ellipse cx="79" cy="52" rx="15" ry="5.5" fill="#f6a884" opacity="0.85"/>
    <rect x="62" y="50" width="5" height="34" rx="2.5" fill="#ffffff" opacity="0.35"/>
  </g>
  <g transform="rotate(9 291 108)">
    <rect x="269" y="44" width="44" height="64" rx="15" ry="15" fill="url(#knobGrad)"/>
    <ellipse cx="291" cy="52" rx="15" ry="5.5" fill="#f6a884" opacity="0.85"/>
    <rect x="274" y="50" width="5" height="34" rx="2.5" fill="#ffffff" opacity="0.35"/>
  </g>

  <!-- body -->
  <rect x="45" y="84" width="280" height="264" rx="62" ry="62" fill="url(#bodyGrad)" stroke="#d5d4cf" stroke-width="1.5"/>

  <!-- body shading, clipped to silhouette, kept outside the screen interior -->
  <g clip-path="url(#bodyClip)">
    <rect x="63" y="90" width="244" height="42" rx="21" fill="url(#sheenGrad)" opacity="0.8"/>
    <rect x="45" y="316" width="280" height="32" fill="url(#aoGrad)"/>
    <rect x="45" y="110" width="34" height="230" fill="url(#sideGradL)"/>
    <rect x="291" y="110" width="34" height="230" fill="url(#sideGradR)"/>
    <!-- knob contact shadows on the top corners -->
    <ellipse cx="80" cy="94" rx="24" ry="6" fill="#000000" opacity="0.14" filter="url(#blurSmall)" transform="rotate(-18 80 94)"/>
    <ellipse cx="290" cy="94" rx="24" ry="6" fill="#000000" opacity="0.14" filter="url(#blurSmall)" transform="rotate(18 290 94)"/>
  </g>
  <!-- top rim light -->
  <g clip-path="url(#bodyClip)">
    <rect x="48" y="87" width="274" height="258" rx="59" ry="59" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.55" clip-path="url(#bodyClip)"/>
  </g>

  <!-- card slot slit on the top edge -->
  <rect x="131" y="81" width="108" height="9" rx="4.5" fill="#45443f"/>
  <rect x="133" y="90.5" width="104" height="2" rx="1" fill="#ffffff" opacity="0.55"/>

  <!-- recessed bezel around the screen -->
  <rect x="93" y="138" width="184" height="184" rx="26" ry="26" fill="url(#bezelGrad)" stroke="#c7c6bf" stroke-width="1"/>
  <rect x="104" y="149" width="162" height="162" rx="17" ry="17" fill="none" stroke="#a5a49b" stroke-width="2"/>

  <!-- LED screen: exact bounds, flat fill, nothing inside -->
  <rect x="105" y="150" width="160" height="160" rx="16" ry="16" fill="#cfcfc6"/>
</svg>
